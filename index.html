/* ---- Onglet Popup ---- */
function AdminPopupTab({popup,onSave,onAddToJournal}) {
  const [title,    setTitle]    = useState(popup?.title||'');
  const [body,     setBody]     = useState(popup?.body||'');
  const [days,     setDays]     = useState(popup?.days||7);
  const [active,   setActive]   = useState(popup?.active||false);
  const [saving,   setSaving]   = useState(false);
  const [proposed, setProposed] = useState(null); // entrée journal proposée

  async function handleSave() {
    setSaving(true);
    const newVersion=(popup?.version||0)+1;
    const newPopup={title,body,days:Number(days),active,version:newVersion,publishedAt:Date.now()};
    await onSave(newPopup);
    // Proposer ajout au journal
    setProposed({title, body, date:new Date().toISOString().slice(0,10), id:Date.now().toString(36)});
    setSaving(false);
  }

  return html`<div>
    <label class="field">
      <span class="field-label">Titre</span>
      <input value=${title} onInput=${e=>setTitle(e.target.value)} placeholder="ex. Nouvelles fonctionnalités"/>
    </label>
    <label class="field">
      <span class="field-label">Contenu</span>
      <textarea value=${body} onInput=${e=>setBody(e.target.value)}
        placeholder="Décrivez les nouveautés..."
        style="width:100%;min-height:120px;resize:vertical;font-family:inherit;font-size:15px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px 14px;outline:none"></textarea>
    </label>
    <div style="display:flex;gap:12px;margin-bottom:14px;align-items:center">
      <label class="field" style="margin-bottom:0;flex:1">
        <span class="field-label">Durée d'affichage (jours)</span>
        <input type="number" min="1" max="90" value=${days} onInput=${e=>setDays(e.target.value)}/>
      </label>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
        <span class="field-label" style="display:block">Active</span>
        <button onClick=${(e)=>{e.preventDefault();e.stopPropagation();setActive(!active);}}
          style=${{width:'48px',height:'28px',borderRadius:'999px',background:active?'var(--green)':'var(--line)',position:'relative',transition:'background .2s',border:'none',cursor:'pointer'}}>
          <span style=${{position:'absolute',top:'3px',left:active?'23px':'3px',width:'22px',height:'22px',borderRadius:'50%',background:'white',transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}></span>
        </button>
      </div>
    </div>
    <button class="btn btn-primary" disabled=${!title||!body||saving} onClick=${handleSave} style="width:100%;margin-bottom:${proposed?'16px':'0'}">
      ${saving?'Sauvegarde...':'Publier la popup'}
    </button>
    ${proposed&&html`<div style="background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:4px">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.1em">Ajouter au journal ?</div>
      <label class="field">
        <span class="field-label">Titre</span>
        <input value=${proposed.title} onInput=${e=>setProposed({...proposed,title:e.target.value})}/>
      </label>
      <label class="field">
        <span class="field-label">Contenu</span>
        <textarea value=${proposed.body} onInput=${e=>setProposed({...proposed,body:e.target.value})}
          style="width:100%;min-height:80px;resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px 14px;outline:none"></textarea>
      </label>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" onClick=${()=>setProposed(null)}>Ignorer</button>
        <button class="btn btn-green" onClick=${()=>{onAddToJournal(proposed);setProposed(null);}}>Ajouter au journal</button>
      </div>
    </div>`}
  </div>`;
}

/* ---- Onglet Journal ---- */
function AdminJournalTab({journal,onSave}) {
  const [entries, setEntries] = useState([...journal].sort((a,b)=>b.date.localeCompare(a.date)));
  const [editing, setEditing] = useState(null);
  const [saving,  setSaving]  = useState(false);

  async function handleDelete(id) {
    const updated=entries.filter(e=>e.id!==id);
    setSaving(true);
    await onSave(updated);
    setEntries(updated);
    setSaving(false);
  }
  async function handleSaveEdit() {
    const updated=entries.map(e=>e.id===editing.id?editing:e);
    setSaving(true);
    await onSave(updated);
    setEntries(updated);
    setEditing(null);
    setSaving(false);
  }

  return html`<div>
    ${entries.length===0&&html`<p style="color:var(--muted);font-style:italic;font-size:14px">Aucune entrée. Publiez une popup pour en créer une.</p>`}
    ${entries.map((e,i)=>html`<div key=${e.id||i} style="border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px">
      ${editing?.id===e.id
        ? html`<div>
            <label class="field"><span class="field-label">Titre</span>
              <input value=${editing.title} onInput=${ev=>setEditing({...editing,title:ev.target.value})}/>
            </label>
            <label class="field"><span class="field-label">Contenu</span>
              <textarea value=${editing.body} onInput=${ev=>setEditing({...editing,body:ev.target.value})}
                style="width:100%;min-height:80px;resize:vertical;font-family:inherit;font-size:14px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px 14px;outline:none"></textarea>
            </label>
            <div style="display:flex;gap:8px">
              <button class="btn btn-secondary" onClick=${()=>setEditing(null)}>Annuler</button>
              <button class="btn btn-primary" onClick=${handleSaveEdit} disabled=${saving}>Sauvegarder</button>
            </div>
          </div>`
        : html`<div>
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
              <div>
                <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">${e.date}</div>
                <div style="font-weight:600;font-size:14px;margin-top:2px">${e.title}</div>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0">
                <button onClick=${()=>setEditing(e)} style="padding:6px;border-radius:8px;color:var(--muted)">
                  <svg style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button onClick=${()=>handleDelete(e.id||i)} style="padding:6px;border-radius:8px;color:#A2351A">
                  <${Icon} name="trash" size=${15}/>
                </button>
              </div>
            </div>
            <div style="font-size:13px;color:var(--muted);line-height:1.5;white-space:pre-wrap">${e.body}</div>
          </div>`
      }
    </div>`)}
  </div>`;
}

/* ---- Onglet Contact ---- */
function AdminContactTab({contactCfg,onSave}) {
  const [email,  setEmail]  = useState(contactCfg?.email||DEFAULT_CONTACT_EMAIL);
  const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);
  async function handleSave() {
    setSaving(true);
    await onSave({...contactCfg,email:email.trim()});
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  }
  return html`<div>
    <label class="field">
      <span class="field-label">Email de destination du formulaire de contact</span>
      <input type="email" value=${email} onInput=${e=>{setEmail(e.target.value);setSaved(false);}} placeholder="votre@email.fr"/>
      <div class="text-help">Les messages du formulaire de contact seront envoyés à cette adresse.</div>
    </label>
    <button class="btn btn-primary" disabled=${!email.includes('@')||saving} onClick=${handleSave} style="width:100%">
      ${saving?'Sauvegarde...':(saved?'✓ Sauvegardé':'Sauvegarder')}
    </button>
  </div>`;
}

/* ---- Onglet Liste d'attente ---- */
function AdminWaitlistTab({waitlist, bookings}) {
  const active = (waitlist||[]).filter(w=>{
    const booking = bookings.find(b=>b.date===w.bookingDate&&b.startTime===w.startTime);
    return !!booking;
  }).sort((a,b)=>a.bookingDate.localeCompare(b.bookingDate)||a.startTime.localeCompare(b.startTime));

  if(active.length===0) return html`<p style="color:var(--muted);font-style:italic;font-size:14px">Aucune liste d'attente active.</p>`;

  return html`<div>
    ${active.map((w,i)=>html`<div key=${w.id||i} style="border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">
        ${longDate(new Date(w.bookingDate+'T00:00:00'))} · ${w.startTime}
      </div>
      <div style="font-weight:600;font-size:14px">${w.name}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${w.address}</div>
      ${w.email&&html`<div style="font-size:12px;color:var(--clay-deep);margin-top:2px">${w.email}</div>`}
    </div>`)}
  </div>`;
}

/* ---- Onglet Coordonnées ---- */
function AdminCoordsTab({residents, profiles, onUpdate}) {
  const [editing, setEditing] = useState(null);
  const [saving,  setSaving]  = useState(false);

  const list = Object.entries(profiles||{}).map(([key, p]) => {
    let prenom=p.prenom||'', nom=p.nom||'', addressNumber=p.addressNumber||'', addressStreet=p.addressStreet||'';
    if (!prenom && !nom) {
      const parts=key.split('|');
      if(parts.length>=4){prenom=parts[0].replace(/_/g,' ');nom=parts[1].replace(/_/g,' ');addressNumber=parts[2];addressStreet=parts[3].replace(/_/g,' ');}
    }
    return {key,prenom,nom,addressNumber,addressStreet,email:p.email||'',tel:p.tel||''};
  }).filter(r=>r.email||r.tel).sort((a,b)=>a.nom.localeCompare(b.nom)||a.prenom.localeCompare(b.prenom));

  function exportCSV(){
    const rows=[['Prénom','Nom','Adresse','Email','Téléphone']];
    for(const r of list) rows.push([r.prenom,r.nom,`${r.addressNumber} ${r.addressStreet}`.trim(),r.email,r.tel]);
    const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='coordonnees-residents.csv';a.click();
    URL.revokeObjectURL(url);
  }

  async function handleSave() {
    setSaving(true);
    try {
      await onUpdate(editing.key, {email: editing.email.trim(), tel: editing.tel.trim()});
      setEditing(null);
    } catch(e) { alert('Erreur : '+e.message); }
    finally { setSaving(false); }
  }

  return html`<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;color:var(--muted)">${list.length} personne${list.length>1?'s':''} · ${list.filter(r=>r.email).length} emails · ${list.filter(r=>r.tel).length} tél.</div>
      <button onClick=${exportCSV} class="btn btn-primary" style="font-size:12px;padding:8px 14px">Exporter CSV</button>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="border-bottom:2px solid var(--line)">
          <th style="text-align:left;padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)">Prénom Nom</th>
          <th style="text-align:left;padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)">Adresse</th>
          <th style="text-align:left;padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)">Email</th>
          <th style="text-align:left;padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)">Tél.</th>
          <th style="padding:8px 6px"></th>
        </tr></thead>
        <tbody>
          ${list.length===0
            ? html`<tr><td colspan="5" style="padding:16px 6px;color:var(--muted);font-style:italic">Aucune coordonnée enregistrée.</td></tr>`
            : list.map((r,i)=>html`<tr key=${i} style="border-bottom:1px solid var(--line)">
                <td style="padding:8px 6px;font-weight:600">${r.prenom} ${r.nom}</td>
                <td style="padding:8px 6px;color:var(--muted)">${r.addressNumber} ${r.addressStreet}</td>
                <td style="padding:8px 6px">${r.email||'—'}</td>
                <td style="padding:8px 6px">${r.tel||'—'}</td>
                <td style="padding:8px 6px">
                  <button onClick=${()=>setEditing({...r})}
                    style="font-size:11px;padding:4px 10px;border-radius:999px;background:var(--clay-soft);color:var(--clay-deep);font-weight:600;border:none;cursor:pointer;font-family:inherit">
                    Modifier
                  </button>
                </td>
              </tr>`)}
        </tbody>
      </table>
    </div>

    ${editing && html`<div class="modal-overlay" onClick=${e=>e.target===e.currentTarget&&setEditing(null)}>
      <div class="modal" onClick=${e=>e.stopPropagation()}>
        <div style="padding:22px 24px 8px;display:flex;align-items:flex-start;justify-content:space-between">
          <div>
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:600;margin-bottom:4px">Coordonnées</div>
            <h3 style="font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;margin:0">${editing.prenom} ${editing.nom}</h3>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${editing.addressNumber} ${editing.addressStreet}</div>
          </div>
          <button onClick=${()=>setEditing(null)} style="padding:8px;color:var(--muted)">✕</button>
        </div>
        <div style="padding:14px 24px 22px;display:flex;flex-direction:column;gap:14px">
          <div>
            <div class="field-label">Email</div>
            <div style="display:flex;gap:8px">
              <input type="email" value=${editing.email}
                onInput=${e=>setEditing(prev=>({...prev,email:e.target.value}))}
                placeholder="votre@email.fr" style="flex:1"/>
              ${editing.email && html`<button onClick=${()=>setEditing(prev=>({...prev,email:''}))}
                style="padding:0 12px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap">
                Effacer
              </button>`}
            </div>
          </div>
          <div>
            <div class="field-label">Téléphone</div>
            <div style="display:flex;gap:8px">
              <input type="tel" value=${editing.tel}
                onInput=${e=>setEditing(prev=>({...prev,tel:e.target.value}))}
                placeholder="06 xx xx xx xx" style="flex:1"/>
              ${editing.tel && html`<button onClick=${()=>setEditing(prev=>({...prev,tel:''}))}
                style="padding:0 12px;border-radius:12px;background:var(--bg);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap">
                Effacer
              </button>`}
            </div>
          </div>
          <div style="display:flex;gap:12px;margin-top:4px">
            <button class="btn btn-secondary" onClick=${()=>setEditing(null)}>Annuler</button>
            <button class="btn btn-primary" disabled=${saving} onClick=${handleSave}>
              ${saving ? 'Enregistrement...' : 'Enregistrer'}
            </button>
          </div>
        </div>
      </div>
    </div>`}
  </div>`;
}

/* ============================================================

function BookingSuccessModal({booking,onClose}) {
  useEffect(()=>{
    const t=setTimeout(onClose,3500);
    return()=>clearTimeout(t);
  },[]);
  const dayLabel = longDate(new Date(booking.date+'T00:00:00'));
  return html`<div class="modal-overlay" style="z-index:200;background:rgba(31,22,17,.4)" onClick=${onClose}>
    <div style="background:var(--paper);border-radius:24px;max-width:360px;width:calc(100% - 32px);padding:28px 24px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:slideUp .25s ease-out">
      <div style="font-size:48px;margin-bottom:12px">🎾</div>
      <h3 style="font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;margin:0 0 8px;color:var(--green)">Réservé !</h3>
      <div style="font-size:15px;color:var(--ink);margin-bottom:4px;text-transform:capitalize">${dayLabel}</div>
      <div style="font-family:'Fraunces',Georgia,serif;font-size:28px;font-weight:600;color:var(--clay);letter-spacing:-.01em">${booking.startTime} — ${booking.endTime}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px">Bon match !</div>
      <button onClick=${onClose} style="margin-top:20px;background:var(--green);color:var(--paper);padding:10px 24px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;border:none;cursor:pointer">OK</button>
    </div>
  </div>`;
}
