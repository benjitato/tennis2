<!DOCTYPE html>
<html lang="fr">
<head>
	<script data-goatcounter="https://chateaurouge.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
   <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F2EBDB">
<title>Tennis du Château Rouge</title>
   <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F2EBDB;--paper:#FBF7EC;--clay:#B84A2C;--clay-deep:#82301A;--clay-soft:#F4DCD0;--green:#2D4A37;--ink:#231811;--muted:#8E8273;--line:#DCCFB6;--strip:#EFE5CF}
*,*::before,*::after{box-sizing:border-box}*{-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Manrope',system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh}
button{font-family:inherit;font-size:inherit;border:none;background:none;cursor:pointer;color:inherit;padding:0;transition:transform .05s}
button:active:not(:disabled){transform:scale(.98)}button:disabled{cursor:default;opacity:.5}
input,select{font-family:inherit;font-size:16px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px 14px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;appearance:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--clay);box-shadow:0 0 0 3px rgba(184,74,44,.15)}
select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238E8273' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
.court-line{height:1px;background:linear-gradient(to right,transparent,var(--line) 20%,var(--line) 80%,transparent);position:relative;margin:0 auto}
.court-line::before,.court-line::after{content:'';position:absolute;top:50%;width:4px;height:4px;border-radius:999px;background:var(--clay)}
.court-line::before{left:calc(50% - 12px);transform:translateY(-50%)}
.court-line::after{left:calc(50% + 8px);transform:translateY(-50%)}
.app{max-width:640px;margin:0 auto;padding-bottom:60px}
/* Header */
.header{background:var(--paper);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px;min-width:0}
.header-title{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:18px;line-height:1;letter-spacing:-.01em;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.emblem{width:40px;height:40px;border-radius:50%;background:var(--clay);flex-shrink:0;position:relative;box-shadow:0 4px 12px rgba(184,74,44,.25)}
.emblem::before{content:'';position:absolute;inset:5px;border:2px solid var(--paper);border-radius:50%}
.emblem::after{content:'';position:absolute;top:50%;left:15%;width:70%;height:1.5px;background:var(--paper);border-radius:999px;transform:rotate(-25deg)}
.emblem.lg{width:52px;height:52px}.emblem.lg::before{inset:7px}
.pill{background:var(--bg);padding:5px 10px;border-radius:999px;font-size:13px;display:inline-flex;align-items:center;gap:5px;max-width:120px}
.pill-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.admin-badge{background:var(--green);color:var(--paper);font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;padding:5px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px}
.stats-btn{width:32px;height:32px;border-radius:50%;background:var(--clay-soft);color:var(--clay-deep);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
/* Hero */
.hero{padding:24px 20px 0}
.hero-meta{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.hero-date{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.hero-court{font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:12px;color:var(--muted)}
.hero-title{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-.01em;margin:0}
.hero-title em{color:var(--clay);font-style:italic}
.hero-cta{width:100%;background:var(--clay);color:var(--paper);padding:15px;border-radius:16px;font-weight:600;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(184,74,44,.25)}
.hero-regles{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:13px;border-radius:16px;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px}
.hero-joueurs{display:flex;align-items:center;justify-content:center;gap:6px;font-size:15px;font-weight:600;color:var(--green);text-decoration:none;padding:13px;border-radius:16px;border:2px solid var(--green);background:rgba(45,74,55,.06)}
/* Day list */
.day-list{margin-top:24px;display:flex;flex-direction:column;gap:14px}
.day-card{background:var(--paper);border:1px solid var(--line);border-radius:20px;overflow:hidden;margin:0 20px}
.day-card.past{opacity:.55}
.day-header{display:flex;align-items:baseline;justify-content:space-between;padding:14px 20px 8px;gap:12px}
.day-title{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:17px;letter-spacing:-.01em;margin:0}
.day-meta{font-size:12px;color:var(--muted)}
.strip{position:relative;height:34px;background:var(--strip);border-radius:6px;margin:0 20px;overflow:hidden}
.strip-tick{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:2px;pointer-events:none;font-size:9px;color:var(--muted);transform:translateX(-50%)}
.strip-tick-line{width:1px;height:4px;background:var(--line);margin-bottom:2px}
.strip-block{position:absolute;top:5px;bottom:5px;border-radius:3px;background:var(--clay);opacity:.92;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.strip-block.mine{background:var(--green)}
.strip-bounds{display:flex;justify-content:space-between;margin:3px 20px 0;font-size:10px;color:var(--muted)}
.day-bookings{padding:6px 12px 10px}
.booking-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--line)}
.booking-row:last-child{border-bottom:none}
.booking-time{width:60px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.booking-time-h{font-family:'Fraunces',Georgia,serif;font-size:15px;line-height:1;font-variant-numeric:tabular-nums}
.booking-time-d{font-size:10px;color:var(--muted);margin-top:2px}
.booking-divider{width:1px;align-self:stretch;background:var(--clay)}
.booking-divider.mine{background:var(--green)}
.booking-info{flex:1;min-width:0}
.booking-name{font-weight:600;font-size:14px;line-height:1.25;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.booking-address{font-size:12px;color:var(--muted);margin-top:2px;overflow-wrap:break-word}
.booking-email{font-size:11px;color:var(--clay-deep);margin-top:2px;font-style:italic}
.booking-end{font-size:11px;color:var(--muted);margin-top:3px}
.doublon-badge{display:inline-flex;align-items:center;gap:3px;background:#FEF3C7;color:#92400E;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.03em}
   .booking-row.ongoing{background:rgba(45,74,55,.07);border-radius:12px}
   .booking-row.past-booking{opacity:.4}
.cancel-btn{padding:8px;border-radius:8px;color:var(--muted);flex-shrink:0}
.empty-row{width:100%;padding:12px 8px;display:flex;justify-content:flex-end;align-items:center;text-align:left}
.empty-text{color:var(--muted);font-style:italic;font-size:14px}
.reserve-link{font-size:12px;font-weight:600;color:var(--clay);display:inline-flex;align-items:center;gap:4px}
/* Footer */
.footer{margin-top:36px;padding:28px 20px 16px;text-align:center;font-size:12px;color:var(--muted)}
.footer .court-line{width:100px;margin-bottom:14px}
.admin-link{display:inline-block;margin-top:14px;color:var(--muted);font-size:11px;opacity:.55}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(31,22,17,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;animation:fadeIn .15s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:24px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:slideUp .2s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px 8px;gap:16px}
.modal-eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:600}
.modal-title{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:22px;letter-spacing:-.01em;margin:0}
.modal-close{padding:8px;margin:-8px -8px 0 0;border-radius:999px;color:var(--muted);flex-shrink:0}
.modal-body{padding:14px 24px 22px}
.modal-text-info{margin:0 0 14px;font-size:14px;color:var(--muted);line-height:1.4}
.field{display:block;margin-bottom:14px}
.field-label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.addr-row{display:grid;grid-template-columns:80px 1fr;gap:8px}
.modal-actions{display:flex;gap:12px;margin-top:6px}
.btn{flex:1;padding:13px;border-radius:14px;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary{background:var(--bg);color:var(--ink)}.btn-primary{background:var(--clay);color:var(--paper)}.btn-danger{background:#A2351A;color:var(--paper)}.btn-green{background:var(--green);color:var(--paper)}
/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.spinner{width:32px;height:32px;border:3px solid var(--clay-soft);border-top-color:var(--clay);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Profile entry */
.profile-entry{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 20px}
.profile-card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:20px}
/* View pages */
.view-page{padding-bottom:40px}
.view-nav{display:flex;align-items:center;gap:10px;padding:16px 20px 8px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--clay);padding:4px 0}
.view-heading{padding:0 20px 6px}
.view-h1{font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px}
.view-sub{font-size:13px;color:var(--muted);margin:0}
/* Stats */
.stats-tabs{display:flex;gap:6px;padding:14px 20px;border-bottom:1px solid var(--line)}
.stats-tab{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--muted);background:var(--bg)}
.stats-tab.active{background:var(--clay);color:var(--paper)}
.stats-body{padding:16px 20px 0}
.stats-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.kpi-card{background:var(--bg);border-radius:14px;padding:14px 10px;text-align:center}
.kpi-value{font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;letter-spacing:-.02em;color:var(--clay);line-height:1}
.kpi-label{font-size:11px;color:var(--muted);margin-top:5px;font-weight:500}
.stats-section{margin-bottom:22px}
.stats-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);font-weight:600;margin-bottom:10px}
.stats-empty{color:var(--muted);font-style:italic;font-size:14px;margin:0 0 20px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-row.clickable{cursor:pointer;border-radius:8px;padding:2px 4px;margin:0 -4px 6px}
.bar-row.clickable:hover{background:var(--bg)}
.bar-label{font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums;font-size:13px;width:38px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:10px;background:var(--strip);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:var(--clay);border-radius:999px;min-width:3px;transition:width .4s ease}
.bar-fill-green{background:var(--green)}
.bar-count{font-size:12px;color:var(--muted);width:24px;text-align:right;flex-shrink:0}
.bar-chevron{color:var(--clay);flex-shrink:0}
.ranking-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer}
.ranking-row:last-child{border-bottom:none}
.ranking-pos{font-family:'Fraunces',Georgia,serif;font-size:18px;font-weight:600;color:var(--clay);width:22px;flex-shrink:0;line-height:1.2}
.ranking-info{flex:1;min-width:0}
.ranking-name{font-weight:600;font-size:14px}
.ranking-address{font-size:12px;color:var(--muted);margin-top:2px}
.ranking-stats{text-align:right;flex-shrink:0}
.ranking-count{font-weight:600;font-size:13px}
.ranking-dur{font-size:11px;color:var(--muted);margin-top:2px}
.history-link{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg);border-radius:14px;margin-bottom:20px;cursor:pointer;border:none;width:100%;font-family:inherit}
.history-link-label{font-weight:600;font-size:14px}
.history-link-sub{font-size:12px;color:var(--muted);margin-top:2px}
/* History view */
.hist-day{margin:0 20px 16px}
.hist-day-label{font-family:'Fraunces',Georgia,serif;font-size:15px;font-weight:500;letter-spacing:-.01em;text-transform:capitalize;color:var(--ink);padding:8px 0 6px;border-bottom:1px solid var(--line);margin-bottom:6px}
.hist-row{display:flex;align-items:baseline;gap:10px;padding:6px 0}
.hist-time{font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;min-width:90px;flex-shrink:0}
.hist-name{font-size:13px;font-weight:600}
.hist-addr{font-size:12px;color:var(--muted);margin-top:1px}
/* Detail views */
.detail-list{padding:0 20px}
.detail-row{padding:12px 0;border-bottom:1px solid var(--line)}
.detail-row:last-child{border-bottom:none}
.detail-date{font-size:12px;color:var(--muted);text-transform:capitalize;margin-bottom:2px}
.detail-time{font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums;font-size:15px;font-weight:600}
.detail-dur{font-size:12px;color:var(--muted);margin-left:8px}
/* Alert section */
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#FEF3C7;border-radius:12px;margin-bottom:8px}
.alert-text{font-size:13px;line-height:1.4;color:#92400E}
/* Personal stats modal */
.personal-kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--paper);padding:10px 18px;border-radius:999px;font-weight:500;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;z-index:200;max-width:calc(100% - 32px)}
.icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.icon-sm{width:16px;height:16px}.icon-xs{width:13px;height:13px}
.text-error{color:#A2351A;font-size:13px;margin:6px 0 0}
.text-help{color:var(--muted);font-size:12px;margin:6px 0 0;line-height:1.4}
/* Reglement */
.regle-section{margin-bottom:18px}
.regle-section h4{font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:600;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.regle-section p{font-size:14px;color:var(--muted);line-height:1.5;margin:0}
/* Preview in booking modal */
.preview-card{background:var(--bg);border-radius:14px;padding:14px;margin-bottom:16px}
.preview-title{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
.preview-strip{position:relative;height:24px;background:var(--strip);border-radius:4px;overflow:hidden;margin-bottom:8px}
.preview-strip .strip-block{top:3px;bottom:3px}
.preview-strip .candidate{position:absolute;top:0;bottom:0;border:2px dashed var(--clay);background:rgba(184,74,44,.15);border-radius:4px;box-sizing:border-box;z-index:2}
.preview-strip .candidate.conflict{border-color:#A2351A;background:rgba(162,53,26,.18)}
.preview-bounds{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:8px}
.preview-list{list-style:none;padding:0;margin:0;font-size:13px}
.preview-list li{padding:4px 0;color:var(--ink);line-height:1.3}
.preview-list .pl-time{font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums;font-weight:600;margin-right:8px}
.preview-list .pl-name{color:var(--muted);font-weight:500}
.preview-list .pl-addr{color:var(--muted);font-size:11px;display:block;margin-left:60px;margin-top:-2px}
.preview-empty{font-size:13px;color:var(--muted);font-style:italic}
/* Stats table modal */
.stats-table-overlay{position:fixed;inset:0;background:rgba(31,22,17,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200;animation:fadeIn .15s ease-out}
.stats-table-modal{background:var(--paper);border-radius:24px;width:100%;max-width:720px;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:slideUp .2s ease-out}
.stats-table-header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;gap:12px}
.stats-table-tabs{display:flex;gap:6px;padding:14px 24px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--line)}
.stats-table-wrap{overflow-y:auto;flex:1}
.stats-tbl{width:100%;border-collapse:collapse;font-size:13px}
.stats-tbl th{background:var(--bg);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.13em;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:0;border-bottom:1px solid var(--line)}
.stats-tbl th:hover{color:var(--clay)}
.stats-tbl th.active{color:var(--clay)}
.stats-tbl td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.stats-tbl tr:last-child td{border-bottom:none}
.stats-tbl tr:hover td{background:var(--bg)}
.sort-arrow{margin-left:4px;opacity:.6}
.doublon-cell{background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
.stats-table-footer{padding:14px 24px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;font-size:13px;color:var(--muted)}
.notice{display:flex;gap:12px;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.4;margin-bottom:12px;align-items:flex-start}
.notice.warning{background:#FCE6DD;color:#7A2A14}
.waitlist-btn{font-size:10px;background:var(--clay-soft);color:var(--clay-deep);padding:3px 8px;border-radius:999px;font-weight:600;font-family:inherit;border:none;cursor:pointer;white-space:nowrap}
/* Residents table */
.residents-table{width:100%;border-collapse:collapse;font-size:14px}
.residents-table th{background:var(--bg);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.13em;font-weight:600;color:var(--muted);border-bottom:1px solid var(--line)}
.residents-table td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.residents-table tr:last-child td{border-bottom:none}
.residents-table tr:hover td{background:rgba(0,0,0,.02)}
.residents-wrap{padding:0 20px;overflow-x:auto}
.add-resident-btn{display:flex;align-items:center;gap:8px;background:var(--green);color:var(--paper);padding:10px 18px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;border:none;cursor:pointer;margin:16px 20px}
</style>

/* ============================================================
   DOUBLON DETECTION
   ============================================================ */
function detectDoublons(bookings) {
  const byKey = {};
  for (const b of bookings) {
    if (isPastBooking(b)) continue;
    const key = `${b.date}|||${b.address||''}`;
    if (!byKey[key]) byKey[key] = [];
    byKey[key].push(b);
  }
  const result = [];
  for (const [key, bks] of Object.entries(byKey)) {
    if (bks.length < 2) continue;
    // Trier par heure de début
    const sorted = [...bks].sort((a,b) => a.startTime.localeCompare(b.startTime));
    // Chercher des créneaux consécutifs (endTime d'un = startTime du suivant)
    const consecutive = [];
    for (let i = 0; i < sorted.length - 1; i++) {
      if (sorted[i].endTime === sorted[i+1].startTime) {
        consecutive.push(sorted[i], sorted[i+1]);
      }
    }
    if (consecutive.length === 0) continue;
    const [date] = key.split('|||');
    const unique = [...new Map(consecutive.map(b => [b.id, b])).values()];
    result.push({ date, name:bks[0].name, address:bks[0].address||'', bookings:unique });
  }
  return result;
}

/* ============================================================
   COMPUTE STATS
   ============================================================ */
function computeStats(allBookings, periodDays) {
  const since = new Date(); since.setDate(since.getDate()-periodDays);
  const sinceStr = dateKey(since);
  const filtered = allBookings.filter(b => b.date >= sinceStr);
  const total = filtered.length;
  const avgDur = total>0 ? Math.round(filtered.reduce((s,b)=>s+durationMin(b.startTime,b.endTime),0)/total) : 0;
  const courtMinDay = (COURT_CLOSE_HOUR-COURT_OPEN_HOUR)*60;
  const occupancy = Math.round((filtered.reduce((s,b)=>s+durationMin(b.startTime,b.endTime),0) / (courtMinDay*periodDays))*100);
  const hourMap={};
  for(const b of filtered){const h=parseInt(b.startTime.split(':')[0]);hourMap[h]=(hourMap[h]||0)+1;}
  const allHours=[];
  for(let h=COURT_OPEN_HOUR;h<COURT_CLOSE_HOUR;h++) allHours.push({hour:h,count:hourMap[h]||0});
  const popularHours=[...allHours].sort((a,b)=>b.count-a.count).filter(h=>h.count>0).slice(0,5);
  const maxHour=Math.max(...allHours.map(h=>h.count),1);
  const dayMap=[0,0,0,0,0,0,0];
  for(const b of filtered){const d=new Date(`${b.date}T00:00:00`).getDay();dayMap[d]++;}
  const maxDay=Math.max(...dayMap,1);
  const hm={};
  for(const b of filtered){
    const k=b.address||'';
    const lastName=b.name?b.name.trim().split(' ').slice(-1)[0]:'?';
    if(!hm[k]) hm[k]={lastName,address:b.address||'',count:0,duration:0};
    hm[k].count++;hm[k].duration+=durationMin(b.startTime,b.endTime);
  }
  const householdRanking=Object.values(hm).sort((a,b)=>b.count-a.count);
  return {total,avgDur,occupancy,popularHours,maxHour,dayMap,maxDay,householdRanking};
}

/* ============================================================
   CSV EXPORT
   ============================================================ */
function exportCSV(bookings) {
  // Detect doublons for CSV
  const countByKey = {};
  for (const b of bookings) {
    const k = `${b.date}|||${b.address||''}`;
    countByKey[k] = (countByKey[k]||0) + 1;
  }
  const headers = ['Date','Heure début','Heure fin','Nom','Adresse','Doublon'];
  const rows = [...bookings]
    .sort((a,b)=>b.date.localeCompare(a.date)||a.startTime.localeCompare(b.startTime))
    .map(b=>{
      const k = `${b.date}|||${b.address||''}`;
      const doublon = countByKey[k] >= 2 ? 'Oui' : '';
      return [b.date,b.startTime,b.endTime,b.name||'',b.address||'',doublon];
    });
  const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='reservations-chateau-rouge.csv'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function parseCSVResidents(text) {
const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim());
  const result = [];
  for (let i = 1; i < lines.length; i++) { // skip header row
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
    if (cols.length >= 3 && cols[0].trim()) {
      result.push({ id:uid(), nom:cols[0].trim(), addressNumber:cols[1].trim(), addressStreet:cols[2].trim() });
    }
  }
  return result;
}

async function parseXLSXResidents(file) {
  // Dynamically load SheetJS only when needed
  if (!window.XLSX) {
    await new Promise((res,rej) => {
      const s=document.createElement('script');
      s.src='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
      s.onload=res; s.onerror=rej;
      document.head.appendChild(s);
    });
  }
  const data = await file.arrayBuffer();
  const wb = window.XLSX.read(data);
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = window.XLSX.utils.sheet_to_json(ws, {header:1});
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const nom = row[0] ? String(row[0]).trim() : '';
    const num = row[1] ? String(row[1]).trim() : '';
    const rue = row[2] ? String(row[2]).trim() : '';
    if (nom) result.push({ id:uid(), nom, addressNumber:num, addressStreet:rue });
  }
  return result;
}

      try{
        const [bd,rd,wl,mt,pp,jj,cc,anRaw]=await Promise.all([
          pantryGet(),residentsGet(),waitlistGet(),fetchMeteo(),
          popupGet(),journalGet(),contactConfigGet(),fbGet('annonces')
        ]);
        setBookings((bd.bookings||[]).filter(Boolean));
        setResidents(rd.residents);
        setWaitlist(wl);
        if(mt) setMeteo(mt);
        setPopup(pp);
        setJournal(jj);
        setContactCfg(cc);
        if(anRaw){const arr=(Array.isArray(anRaw)?anRaw:Object.values(anRaw)).filter(Boolean).filter(a=>a.expiresAt>Date.now());setAnnoncesCount(arr.length);}
      }catch{}finally{setLoading(false);}
    })();
  },[]);

  useEffect(()=>{
    if(!HAS_CONFIG||!profile) return;
    const tick=async()=>{
      if(document.hidden) return;
      try{const d=await pantryGet();setBookings((d.bookings||[]).filter(Boolean));}catch{}
      try{const w=await waitlistGet();setWaitlist(w);}catch{}
    };
    const id=setInterval(tick,POLL_MS);
    document.addEventListener('visibilitychange',tick);
    return()=>{clearInterval(id);document.removeEventListener('visibilitychange',tick);};
  },[profile]);

  const showToast=(msg,kind='success')=>{setToast({msg,kind});setTimeout(()=>setToast(null),2800);};
  const saveProfile=async(p)=>{
    // Récupérer l'email depuis Firebase si pas dans le profil
    let finalProfile = p;
    if(!p.email) {
      const userId = makeUserId(p);
      const [fbEmail, fbTel] = await Promise.all([profileEmailGet(userId), profileTelGet(userId)]);
      if(fbEmail||fbTel) finalProfile = {...p, ...(fbEmail?{email:fbEmail}:{}), ...(fbTel?{tel:fbTel}:{})};
    }
    saveProfileLocal(finalProfile);setProfile(finalProfile);setModal(null);setEntryAdmin(false);
    localStorage.setItem('tennis-cr-session','ok');
    (async()=>{try{const userId=makeUserId(finalProfile);const cur=await profileGet(userId);if(!cur.prenom)await profileSet(userId,{...cur,prenom:finalProfile.prenom||'',nom:finalProfile.nom||'',addressNumber:finalProfile.addressNumber||'',addressStreet:finalProfile.addressStreet||''});}catch{}})();
    // Vérifier si la popup doit s'afficher
    if(popup&&popup.active&&popup.version!=null){
      const userId = makeUserId(finalProfile);
      seenPopupGet(userId).then(seen=>{
        if(seen && String(seen.version)===String(popup.version)) return;
        const publishedAt=popup.publishedAt||0;
        const expiresAt=publishedAt+(popup.days||7)*24*60*60*1000;
        if(Date.now()<expiresAt) setShowPopup(true);
      });
    }
  };
  const logout=()=>{
    try{localStorage.removeItem('tennis-cr-profile');localStorage.removeItem('tennis-cr-admin');localStorage.removeItem('tennis-cr-session');}catch{}
    setProfile(null);setIsAdmin(false);setModal(null);setView('main');
    showToast('Déconnecté');
  };

  async function saveResidents(list) {
    try{await residentsSave(list);setResidents(list);showToast('Résidents mis à jour');}
    catch{showToast('Erreur lors de la sauvegarde','error');}
  }
  const tryAdmin=async code=>{
    const ok=await verifyAdminCode(code);
    if(!ok) return false;
    saveAdminFlag(true);setIsAdmin(true);setModal(null);setView('stats');
    showToast('Mode administrateur activé');return true;
  };
  const logoutAdmin=()=>{saveAdminFlag(false);setIsAdmin(false);setView('main');showToast('Mode admin désactivé');};
  const canCancel=b=>isAdmin||sameResident(b,profile);

  async function createBooking({date,startTime,emailForBooking}) {
    const endTime=minToTime(timeToMin(startTime)+BOOKING_DURATION);
    let fresh;
    try{fresh=((await pantryGet()).bookings||[]).filter(Boolean);}catch(e){throw new Error('Lecture impossible');}
    const emailToUse = emailForBooking || profile.email || '';
    const candidate={id:uid(),name:profileFullName(profile),address:profileAddr(profile),email:emailToUse,date,startTime,endTime,createdAt:Date.now()};
    if(fresh.some(b=>overlaps(b,candidate))) throw new Error('Ce créneau est déjà réservé.');
    const updated=[...fresh,candidate];
    try{await pantrySave(updated);}catch(e){throw new Error('Écriture refusée ('+e.message+')');}
    setBookings(updated);
    // Sauvegarder email dans Firebase + localStorage si nouveau
    if(emailToUse && !profile.email) {
      const pUserId = makeUserId(profile);
      await profileEmailSet(pUserId, emailToUse);
      const updatedProfile = {...profile, email: emailToUse};
      saveProfileLocal(updatedProfile);
      setProfile(updatedProfile);
    }
    // Email de confirmation
    if(emailToUse) {
      sendEmail({
        to: emailToUse,
        subject: 'Réservation confirmée — Tennis Château Rouge',
        html: `<p>Bonjour ${escapeHtml(profileFullName(profile))},</p>
               <p>Votre réservation est confirmée :</p>
               <p><strong>${longDate(new Date(candidate.date+'T00:00:00'))}</strong> de <strong>${candidate.startTime} à ${candidate.endTime}</strong></p>
               <p>Bon match !</p>
               <p style="color:#888;font-size:12px">Tennis du Château Rouge · Ne pas répondre à cet email</p>`
      }).catch(()=>{});
    }
  }

  async function cancelBooking(id) {
    let fresh, freshWl;
    try{fresh=((await pantryGet()).bookings||[]).filter(Boolean);}catch{showToast('Lecture impossible','error');return;}
    try{freshWl=await waitlistGet();}catch{freshWl=[];}
    const cancelled=fresh.find(b=>b.id===id);
    const updated=fresh.filter(b=>b.id!==id);
    try{await pantrySave(updated);}catch{showToast('Annulation impossible','error');return;}
    setBookings(updated);
    // Promouvoir le premier en liste d'attente
    if(cancelled) {
      const waiter=freshWl.find(w=>w.bookingDate===cancelled.date&&w.startTime===cancelled.startTime);
      if(waiter) {
        // Créer la réservation pour le waiter
        const newBooking={id:uid(),name:waiter.name,address:waiter.address,email:waiter.email,date:cancelled.date,startTime:cancelled.startTime,endTime:cancelled.endTime,createdAt:Date.now()};
        const withNew=[...updated,newBooking];
        try{await pantrySave(withNew);setBookings(withNew);}catch{}
        // Supprimer de la liste d'attente
        const newWl=freshWl.filter(w=>!(w.bookingDate===cancelled.date&&w.startTime===cancelled.startTime));
        try{await waitlistSave(newWl);setWaitlist(newWl);}catch{}
        // Email au waiter promu
        await sendEmail({
          to: waiter.email,
          subject: 'Votre créneau est confirmé — Tennis Château Rouge',
          html: `<p>Bonjour ${escapeHtml(waiter.name)},</p><p>Bonne nouvelle ! Le créneau du <strong>${longDate(new Date(cancelled.date+'T00:00:00'))}</strong> de <strong>${cancelled.startTime} à ${cancelled.endTime}</strong> vient de se libérer et vous êtes automatiquement inscrit(e).</p><p>Bon match !</p><p style="color:#888;font-size:12px">Tennis du Château Rouge · Ne pas répondre à cet email</p>`
        });
        showToast("Réservation annulée · créneau attribué à la liste d'attente");
        return;
      }
    }
    showToast('Réservation annulée');
  }

  async function joinWaitlist(booking) {
    if (!profile.email) { showToast("Ajoutez votre email dans Mon compte pour rejoindre la liste d'attente","error"); return; }
    const freshWl = await waitlistGet();
    const already = freshWl.find(w=>w.bookingDate===booking.date&&w.startTime===booking.startTime);
    if (already) { showToast("Un voisin est déjà en liste d'attente pour ce créneau"); return; }
    const entry = {id:uid(),name:profileFullName(profile),address:profileAddr(profile),email:profile.email,bookingDate:booking.date,startTime:booking.startTime,createdAt:Date.now()};
    const updated=[...freshWl,entry];
    await waitlistSave(updated);
    setWaitlist(updated);
    // Email au titulaire
    if (booking.email) {
      await sendEmail({
        to: booking.email,
        subject: 'Un voisin attend votre créneau — Tennis Château Rouge',
        html: `<p>Bonjour ${escapeHtml(booking.name)},</p><p><strong>${escapeHtml(profileFullName(profile))}</strong> s'est inscrit(e) en liste d'attente sur votre créneau du <strong>${longDate(new Date(booking.date+'T00:00:00'))}</strong> de <strong>${booking.startTime} à ${booking.endTime}</strong>.</p><p>Si vous ne pouvez finalement pas jouer, pensez à annuler votre réservation pour lui libérer la place.</p><p style="color:#888;font-size:12px">Tennis du Château Rouge · Ne pas répondre à cet email</p>`
      });
    }
    showToast("Inscrit en liste d'attente !");
  }

  async function leaveWaitlist(booking) {
    const freshWl = await waitlistGet();
    const updated = freshWl.filter(w=>!(w.bookingDate===booking.date&&w.startTime===booking.startTime&&normalizeStr(w.address||'')===normalizeStr(profileAddr(profile))));
    await waitlistSave(updated);
    setWaitlist(updated);
    showToast("Retiré de la liste d'attente");
  }

  const days = useMemo(()=>{
    const out=[],base=startOfDay(new Date());
    for(let i=0;i<daysVisible;i++){
      const d=new Date(base);d.setDate(base.getDate()+i);
      const k=dateKey(d);
      const dayB=bookings.filter(b=>b.date===k&&(k===dateKey(new Date())||!isPastBooking(b))).sort((a,b)=>a.startTime.localeCompare(b.startTime));
      out.push({date:d,key:k,bookings:dayB});
    }
    return out;
  },[bookings,daysVisible]);

  const doublons = useMemo(()=>isAdmin?detectDoublons(bookings):[],[bookings,isAdmin]);

  if(!HAS_CONFIG) return html`<${ConfigMissing}/>`;
  if(loading) return html`<div class="loading-screen"><div class="spinner"></div></div>`;
  if(!profile && entryAdmin) return html`<${ResidentsView} residents=${residents} onSave=${saveResidents} fromEntry=${true} onBack=${()=>setEntryAdmin(false)}/>`;
  if(!profile) return html`<${ProfileEntry} residents=${residents} onSubmit=${saveProfile} onAdminEntry=${()=>setEntryAdmin(true)} onContact=${()=>setModal('contact')}/>`; 

  const goStats=()=>setView(view==='stats'?'main':'stats');

  return html`<div class="app">
    <${Header} profile=${profile} isAdmin=${isAdmin} view=${view}
      onEditProfile=${()=>setModal('edit-profile')}
      onPersonalStats=${()=>setModal('personal-stats')}
      onAdminToggle=${()=>isAdmin?logoutAdmin():setModal('admin')}
      onStatsClick=${goStats}
      onAdminPanel=${()=>setView('admin-panel')}/>

    ${view==='admin-panel' ? html`<${AdminPanelView}
        popup=${popup} journal=${journal} contactCfg=${contactCfg}
        onSavePopup=${async(p)=>{await popupSave(p);setPopup(p);showToast('Popup sauvegardée');}}
        onSaveJournal=${async(j)=>{await journalSave(j);setJournal(j);showToast('Journal mis à jour');}}
        onSaveContactCfg=${async(c)=>{await contactConfigSave(c);setContactCfg(c);showToast('Email de contact mis à jour');}}
        residents=${residents}
        waitlist=${waitlist}
        bookings=${bookings}
        coordsProfiles=${coordsProfiles}
        onRefreshWaitlist=${async()=>{const w=await waitlistGet();setWaitlist(w);return w;}}
        onSaveResidents=${saveResidents}
        onBack=${()=>setView('main')}
		onUpdateProfile=${async(key,data)=>{const cur=coordsProfiles[key]||{};const updated={...cur,...data};await profileSet(key,updated);setCoordsProfiles(prev=>({...prev,[key]:updated}));}}
        onLogoutAdmin=${logoutAdmin}/>`
    :view==='residents' ? html`<${ResidentsView} residents=${residents} onSave=${saveResidents} fromEntry=${false} onBack=${()=>setView('stats')}/>`
    :view==='history'   ? html`<${HistoryView} bookings=${bookings} onBack=${()=>setView('stats')}/>`
    :view==='stats'      ? html`<${StatsView} bookings=${bookings} period=${period} setPeriod=${setPeriod} doublons=${doublons}
        onViewHistory=${()=>setView('history')}
        onViewResidents=${()=>setView('residents')}
        onViewNeighbor=${n=>setView({type:'neighbor',neighbor:n})}
        onViewWeekday=${d=>setView({type:'weekday',weekday:d})}
        onExportCSV=${()=>exportCSV(bookings)}
        onOpenStatsTable=${()=>setModal('stats-table')}
        onViewHousehold=${h=>setView({type:'household',household:h})}/>`
    :view?.type==='neighbor' ? html`<${NeighborView} neighbor=${view.neighbor} bookings=${bookings} isAdmin=${isAdmin} onBack=${()=>setView('stats')}/>`
    :view?.type==='household' ? html`<${HouseholdView} household=${view.household} bookings=${bookings} onBack=${()=>setView('stats')}/>`
    :view?.type==='weekday'  ? html`<${WeekdayView} weekday=${view.weekday} period=${period} bookings=${bookings} onBack=${()=>setView('stats')}/>`
    : html`<${MainView} days=${days} profile=${profile} isAdmin=${isAdmin} doublons=${doublons} annoncesCount=${annoncesCount}
        waitlist=${waitlist} meteo=${meteo}
        canCancel=${canCancel}
        onRequestCancel=${b=>setModal({type:'cancel',booking:b})}
        onBook=${pf=>setModal({type:'booking',prefill:pf||null})}
        onRequestWaitlist=${b=>setModal({type:'waitlist-join',booking:b})}
        onLeaveWaitlist=${b=>setModal({type:'waitlist-leave',booking:b})}
        onAdminToggle=${()=>isAdmin?logoutAdmin():setModal('admin')}
        onOpenReglement=${()=>setModal('reglement')}
        onOpenJournal=${()=>setModal('journal')}
        onOpenContact=${()=>setModal('contact')}
        onMoreDays=${()=>setDaysVisible(v=>v+7)}/>`}

    ${modal==='admin'          && html`<${AdminModal} onClose=${()=>setModal(null)} onSubmit=${tryAdmin}/>`}
  ${modal==='stats-table'    && html`<${StatsTableModal} bookings=${bookings} onClose=${()=>setModal(null)}/>`}
    ${modal==='edit-profile'   && html`<${ProfileEditModal} profile=${profile} onClose=${()=>setModal(null)} onSubmit=${saveProfile}/>`}
    ${modal==='personal-stats' && html`<${PersonalStatsModal} profile=${profile} bookings=${bookings} onClose=${()=>setModal(null)} onLogout=${logout} onSaveEmail=${async(email,tel)=>{
      const pUserId = makeUserId(profile);
      const currentP = await profileGet(pUserId);
      await profileSet(pUserId, {
        ...currentP,
        prenom: profile.prenom||'',
        nom: profile.nom||'',
        addressNumber: profile.addressNumber||'',
        addressStreet: profile.addressStreet||'',
        ...(email?{email}:{}),
        ...(tel!==undefined?{tel}:{})
      });
      const p={...profile,email,tel};
      saveProfileLocal(p);setProfile(p);
      showToast('Coordonnées sauvegardées');
    }}/>`}
    ${modal==='reglement'      && html`<${ReglementModal} onClose=${()=>setModal(null)}/>`}
    ${modal?.type==='booking'  && html`<${BookingModal}
      profile=${profile} existingBookings=${bookings.filter(b=>!isPastBooking(b))} prefill=${modal.prefill}
      onClose=${()=>setModal(null)}
      onConfirm=${async data=>{
        await createBooking(data);
        const endTime=minToTime(timeToMin(data.startTime)+BOOKING_DURATION);
        setModal(null);
        setBookingSuccess({date:data.date,startTime:data.startTime,endTime});
      }}/>`}
    ${modal?.type==='cancel'   && html`<${ConfirmModal}
      title="Annuler cette réservation ?"
      description=${`${longDate(new Date(modal.booking.date+'T00:00:00'))} · ${modal.booking.startTime}–${modal.booking.endTime} · ${modal.booking.name}`}
      confirmLabel="Annuler la résa" tone="danger"
      onConfirm=${async()=>{await cancelBooking(modal.booking.id);setModal(null);}}
      onCancel=${()=>setModal(null)}/>`}

    ${modal?.type==='waitlist-join' && html`<${ConfirmModal}
      title="S'inscrire en liste d'attente ?"
      description=${`Créneau du ${longDate(new Date(modal.booking.date+'T00:00:00'))} de ${modal.booking.startTime} à ${modal.booking.endTime}. Vous serez automatiquement inscrit si ce créneau se libère.`}
      confirmLabel="S'inscrire" tone="primary"
      onConfirm=${async()=>{await joinWaitlist(modal.booking);setModal(null);}}
      onCancel=${()=>setModal(null)}/>`}
    ${modal?.type==='waitlist-leave' && html`<${ConfirmModal}
      title="Se retirer de la liste d'attente ?"
      description=${`Créneau du ${longDate(new Date(modal.booking.date+'T00:00:00'))} de ${modal.booking.startTime} à ${modal.booking.endTime}.`}
      confirmLabel="Se retirer" tone="danger"
      onConfirm=${async()=>{await leaveWaitlist(modal.booking);setModal(null);}}
      onCancel=${()=>setModal(null)}/>`}
    ${modal==='contact' && html`<${ContactModal} contactCfg=${contactCfg} onClose=${()=>setModal(null)}/>`}
    ${modal==='journal' && html`<${JournalModal} journal=${journal} onClose=${()=>setModal(null)}/>`}
    ${showPopup&&popup&&html`<${PopupNouveautesModal} popup=${popup} onClose=${()=>{
      if(profile){const userId=makeUserId(profile);seenPopupSet(userId,popup.version).catch(()=>{});}
      setShowPopup(false);
    }}/>`}
    ${bookingSuccess&&html`<${BookingSuccessModal}
      booking=${bookingSuccess}
      onClose=${()=>setBookingSuccess(null)}/>`}
    ${toast&&html`<div class="toast"><${Icon} name="check" size=${16}/>${toast.msg}</div>`}
  </div>`;
}

        canCancel=${canCancel} onRequestCancel=${onRequestCancel} onBook=${pf=>onBook(pf)} onRequestWaitlist=${onRequestWaitlist} onLeaveWaitlist=${onLeaveWaitlist}/>`)}
    </div>

      <button onClick=${onMoreDays} style="display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">
        Voir les 7 jours suivants
      </button>
    </div>
    <footer class="footer">
      <div class="court-line"></div>
      <div style="font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:14px">Bon match.</div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">
        <button onClick=${onOpenJournal} style="display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">
          📋 Journal des évolutions
        </button>
        <button onClick=${onOpenContact} style="display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">
          ✉️ Contacter l'admin
        </button>
      </div>
      <button class="admin-link" onClick=${onAdminToggle}>
        ${isAdmin?'Désactiver le mode admin':'Mode administrateur'}
      </button>

  </div>`;

/* ============================================================
   DAY CARD
   ============================================================ */
function DayCard({day,profile,isAdmin,doublons,waitlist,meteo,canCancel,onRequestCancel,onBook,onRequestWaitlist,onLeaveWaitlist}) {
  const {date,bookings}=day;
  const total=(COURT_CLOSE_HOUR-COURT_OPEN_HOUR)*60;
  const past=isPastDay(date);
  let label;
  if(isToday(date)) label=`Aujourd'hui · ${longDate(date)}`;
  else if(isTomorrow(date)) label=`Demain · ${longDate(date)}`;
  else label=longDate(date);

  // Check doublons for this day
  const dayDoublonAddrs=new Set(doublons.filter(d=>d.date===day.key).map(d=>d.address));

  const ticks=[];
  for(let i=0;i<=COURT_CLOSE_HOUR-COURT_OPEN_HOUR;i++){
    const left=(i*60/total)*100, hour=COURT_OPEN_HOUR+i;
    ticks.push(html`<div class="strip-tick" style=${`left:${left}%`}><div class="strip-tick-line"></div>${hour%2===0?html`<span>${hour}h</span>`:null}</div>`);
  }

  const dayMeteo = meteo?.[day.key];
  return html`<article class="day-card ${past?'past':''}">
    <div class="day-header">
      <h3 class="day-title" style="text-transform:capitalize">${label}</h3>
      <div style="display:flex;align-items:center;gap:8px">
        ${dayMeteo&&html`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--clay-soft);color:var(--clay-deep);padding:4px 10px;border-radius:999px;font-size:13px;font-weight:600">
          <span>${dayMeteo.icon}</span>
          <span style="font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums">${dayMeteo.tmin}°<span style="opacity:.55;font-weight:400;margin:0 1px">/</span>${dayMeteo.tmax}°</span>

                    const iAmWaiter=waitlist&&waitlist.some(w=>w.bookingDate===b.date&&w.startTime===b.startTime&&normalizeStr(w.address||'')===normalizeStr(profileAddr(profile)));
                    if(iAmWaiter) return html`<button onClick=${()=>onLeaveWaitlist(b)} style="font-size:10px;background:#FEF3C7;color:#92400E;padding:3px 8px;border-radius:999px;font-weight:600;white-space:nowrap;border:1px solid #F6D860;cursor:pointer;font-family:inherit">Se retirer de la liste</button>`;

}

/* ============================================================
   BOOKING MODAL — start time only, end = start + 1h
   ============================================================ */
function BookingModal({profile,existingBookings,prefill,onClose,onConfirm}) {
  const [date,     setDate]     = useState(prefill?.date??dateKey(new Date()));
  const [startTime,setStartTime]= useState(()=>{
    if(prefill?.startTime) return prefill.startTime;
    const now=new Date(), totalMin=Math.ceil((now.getHours()*60+now.getMinutes())/30)*30;
    const maxStart=(COURT_CLOSE_HOUR-1)*60;
    if(totalMin>maxStart) return `${pad(COURT_OPEN_HOUR)}:00`;
    return minToTime(Math.min(totalMin,maxStart));
  });
  const [error,    setError]    = useState(null);
  const [saving,   setSaving]   = useState(false);
  const [emailStep, setEmailStep] = useState(false);
  const [emailInput, setEmailInput] = useState('');

  const endTime = minToTime(timeToMin(startTime)+BOOKING_DURATION);

  const dateOpts=useMemo(()=>{
    const out=[],base=startOfDay(new Date());
    for(let i=0;i<DAYS_AHEAD;i++){const d=new Date(base);d.setDate(base.getDate()+i);out.push({key:dateKey(d),label:niceDateLabel(d)});}
    return out;
  },[]);

  const startSlots=useMemo(()=>{
    const today=dateKey(new Date());
    const now=new Date();
    const nowMin=now.getHours()*60+now.getMinutes();
    const currentHourStart=now.getHours()*60; // début de l'heure en cours
    return START_SLOTS.filter(s=>{
      if(date!==today) return true;
      const slotMin=timeToMin(s);
      // Autoriser le créneau en cours (même heure) + créneaux futurs
      return slotMin>=currentHourStart;
    });
  },[date]);

  const dayBookings=useMemo(()=>existingBookings.filter(b=>b.date===date).sort((a,b)=>a.startTime.localeCompare(b.startTime)),[existingBookings,date]);

  const conflict=useMemo(()=>{
    const c={id:'tmp',date,startTime,endTime,name:profile.name};
    return dayBookings.find(b=>overlaps(b,c));
  },[date,startTime,endTime,dayBookings]);

  const totalMin=(COURT_CLOSE_HOUR-COURT_OPEN_HOUR)*60;

  async function confirm() {
    setError(null);
    if(conflict){setError('Ce créneau est déjà réservé.');return;}
    // Si pas d'email connu, demander avant de confirmer
    if(!profile.email && !emailStep) { setEmailStep(true); return; }
    setSaving(true);
    try{await onConfirm({date,startTime,emailForBooking:emailInput||profile.email||undefined});}
    catch(e){setError(e.message||'Une erreur est survenue.');setSaving(false);}
  }

  return html`<${Modal} onClose=${onClose}>
    <div class="modal-header">
      <div><div class="modal-eyebrow">Réservation</div><h3 class="modal-title">Choisissez un créneau</h3></div>
      <button class="modal-close" onClick=${onClose}><${Icon} name="x"/></button>
    </div>
    <div class="modal-body">

      <label class="field">
        <span class="field-label">Jour</span>
        <select value=${date} onChange=${e=>setDate(e.target.value)}>
          ${dateOpts.map(o=>html`<option value=${o.key}>${o.label}</option>`)}
        </select>
      </label>

      <!-- Preview -->
      <div class="preview-card">
        <div class="preview-title">Déjà pris ce jour-là</div>
        <div class="preview-strip">
          ${(()=>{const t=[];for(let i=0;i<=COURT_CLOSE_HOUR-COURT_OPEN_HOUR;i++) t.push(html`<div class="strip-tick" style=${`left:${(i*60/totalMin)*100}%`}><div class="strip-tick-line"></div></div>`);return t;})()}
          ${dayBookings.map(b=>{const sm=timeToMin(b.startTime)-COURT_OPEN_HOUR*60,w=durationMin(b.startTime,b.endTime);return html`<div class="strip-block" style=${`left:${(sm/totalMin)*100}%;width:${(w/totalMin)*100}%`}></div>`;})}
          <div class="candidate ${conflict?'conflict':''}" style=${`left:${((timeToMin(startTime)-COURT_OPEN_HOUR*60)/totalMin)*100}%;width:${(BOOKING_DURATION/totalMin)*100}%`}></div>
        </div>
        <div class="preview-bounds"><span>${COURT_OPEN_HOUR}h</span><span>${COURT_CLOSE_HOUR}h</span></div>
        ${dayBookings.length===0
          ? html`<div class="preview-empty">Terrain libre toute la journée.</div>`
          : html`<ul class="preview-list">${dayBookings.map(b=>html`<li><span class="pl-time">${b.startTime}–${b.endTime}</span><span class="pl-name">${b.name}</span><span class="pl-addr">${b.address}</span></li>`)}</ul>`
        }
      </div>

      <label class="field">
        <span class="field-label">Heure de début</span>
        <select value=${startTime} onChange=${e=>setStartTime(e.target.value)}>
          ${startSlots.length===0?html`<option>—</option>`:null}
          ${startSlots.map(s=>html`<option value=${s}>${s}</option>`)}
        </select>
      </label>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 12px;font-size:14px">
        <span style="color:var(--muted)">Fin automatique</span>
        <span style="font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums;font-size:16px;font-weight:600">${endTime}</span>
      </div>

      ${conflict&&html`<div class="notice warning"><${Icon} name="alert" size=${16}/><div>Conflit avec <strong>${conflict.name}</strong> (${conflict.startTime}–${conflict.endTime}).</div></div>`}
      ${error&&html`<p class="text-error">${error}</p>`}

      ${emailStep&&!profile.email&&html`<div style="background:var(--bg);border-radius:14px;padding:14px;margin-bottom:14px">
        <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px">Votre email</div>
        <input type="email" value=${emailInput} onInput=${e=>setEmailInput(e.target.value)} placeholder="votre@email.fr" autoFocus/>
        <div class="text-help" style="margin-top:6px">Pour être notifié si quelqu'un s'inscrit en liste d'attente sur votre créneau. Enregistré sur votre compte.</div>
      </div>`}

      <div class="modal-actions">
        <button class="btn btn-secondary" onClick=${onClose}>Annuler</button>
        <button class="btn btn-primary" disabled=${!!conflict||saving||(emailStep&&!profile.email&&!emailInput.includes('@'))} onClick=${confirm}>
          ${saving?html`<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>`:html`<${Icon} name="check" size=${16}/>`}
          ${emailStep&&!profile.email?'Confirmer avec email':'Confirmer'}
        </button>
      </div>
    </div>
  </>`;
}

const niceDateLabel = d => {
  if(isToday(d)) return `Aujourd'hui — ${longDate(d)}`;
  if(isTomorrow(d)) return `Demain — ${longDate(d)}`;
  return longDate(d);
};

function HistoryView({bookings,onBack}) {

    return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,bks])=>({date,bookings:bks.sort((a,b)=>a.startTime.localeCompare(b.startTime))}));
  },[bookings,today]);
  return html`<div class="view-page">
    <div class="view-nav"><button class="back-btn" onClick=${onBack}><${Icon} name="back" size=${16}/> Statistiques</button></div>
    <div class="view-heading"><h2 class="view-h1">Historique</h2><p class="view-sub">${pastDays.length} jour${pastDays.length>1?'s':''} avec réservations</p></div>

          ${d.bookings.map(b=>html`<div class="hist-row">

            <div><div class="hist-name">${b.name}</div><div class="hist-addr">${b.address}</div></div>
          </div>`)}
        </div>`)
    }
  </div>`;
}

/* ============================================================
   WEEKDAY VIEW
   ============================================================ */
function WeekdayView({weekday,period,bookings,onBack}) {
  const since=new Date();since.setDate(since.getDate()-period);
  const sinceStr=dateKey(since);
  const filtered=useMemo(()=>bookings.filter(b=>{const d=new Date(`${b.date}T00:00:00`).getDay();return d===weekday&&b.date>=sinceStr;}),[bookings,weekday,sinceStr]);
  const hourMap={};
  for(const b of filtered){const h=parseInt(b.startTime.split(':')[0]);hourMap[h]=(hourMap[h]||0)+1;}
  const top=[];for(let h=COURT_OPEN_HOUR;h<COURT_CLOSE_HOUR;h++) if(hourMap[h]) top.push({hour:h,count:hourMap[h]});
  top.sort((a,b)=>b.count-a.count);
  const maxC=Math.max(...top.map(h=>h.count),1);
  return html`<div class="view-page">
    <div class="view-nav"><button class="back-btn" onClick=${onBack}><${Icon} name="back" size=${16}/> Statistiques</button></div>
    <div class="view-heading" style="margin-bottom:16px">
      <h2 class="view-h1">Les ${FR_DAYS_F[weekday]}</h2>
      <p class="view-sub">${filtered.length} réservation${filtered.length>1?'s':''} sur la période</p>
    </div>
    <div style="padding:0 20px">
      ${top.length===0
        ? html`<p style="color:var(--muted);font-style:italic">Aucune réservation ce jour sur la période.</p>`
        : top.map(h=>html`<div class="bar-row">
            <div class="bar-label">${pad(h.hour)}h</div>
            <div class="bar-track"><div class="bar-fill" style=${`width:${Math.round(h.count/maxC*100)}%`}></div></div>
            <div class="bar-count">${h.count}</div>
          </div>`)
      }
    </div>
  </div>`;
}

				  }).catch(()=>{});
				},[]);
	const [saving, setSaving] = useState(false);
  const [saved,  setSaved]  = useState(false);
  const [showAllPast, setShowAllPast] = useState(false);
  const addr = profileAddr(profile);
  const fullName = profileFullName(profile);
  const upcoming = useMemo(()=>
    bookings.filter(b=>normalizeStr(b.name||'')===normalizeStr(fullName)&&normalizeStr(b.address||'')===normalizeStr(addr)&&!isPastBooking(b))
      .sort((a,b)=>a.date.localeCompare(b.date)||a.startTime.localeCompare(b.startTime))
  ,[bookings,addr,fullName]);

    bookings.filter(b=>normalizeStr(b.name||'')===normalizeStr(fullName)&&normalizeStr(b.address||'')===normalizeStr(addr)&&isPastBooking(b))
      .sort((a,b)=>b.date.localeCompare(a.date)||a.startTime.localeCompare(b.startTime))
  ,[bookings,addr,fullName]);
  // Réservations des autres membres du foyer
  const householdUpcoming = useMemo(()=>
    bookings.filter(b=>normalizeStr(b.name||'')!==normalizeStr(fullName)&&normalizeStr(b.address||'')===normalizeStr(addr)&&!isPastBooking(b))
      .sort((a,b)=>a.date.localeCompare(b.date)||a.startTime.localeCompare(b.startTime))
  ,[bookings,addr,fullName]);

  async function handleSaveEmail() {
    setSaving(true);
    await onSaveEmail(email.trim(), tel.trim());
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false),2500);

  return html`<${Modal} onClose=${onClose}>

      <div><div class="modal-eyebrow">Mon compte</div><h3 class="modal-title">${profileFullName(profile)}</h3></div>

        <div class="text-help">Pour être notifié si quelqu'un s'inscrit en liste d'attente sur votre créneau.</div>

        <div class="text-help">Utilisé pour le module "Trouver un partenaire".</div>
      </label>
      <button onClick=${handleSaveEmail} disabled=${(email&&!email.includes('@'))||(!email&&!tel)||saving} style="width:100%;background:var(--clay);color:var(--paper);padding:13px;border-radius:14px;font-weight:600;font-size:15px;font-family:inherit;cursor:pointer;border:none;margin-bottom:20px">
        ${saving?'Enregistrement...':(saved?'✓ Coordonnées enregistrées':'Enregistrer mes coordonnées')}
      </button>
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);font-weight:600;margin-bottom:10px">Mes réservations à venir</div>
      <div style="max-height:180px;overflow-y:auto;margin-bottom:16px">
        ${upcoming.length===0
          ? html`<p style="color:var(--muted);font-style:italic;font-size:14px">Aucune réservation à venir.</p>`

              <div><span class="detail-time">${b.startTime}–${b.endTime}</span><span class="detail-dur">(1 h)</span></div>

/* ============================================================
   STATS TABLE MODAL
   ============================================================ */
function StatsTableModal({bookings,onClose}) {
  const PERIODS=[{label:'1 mois',days:30},{label:'3 mois',days:90},{label:'6 mois',days:182},{label:'12 mois',days:365},{label:'Tout',days:0}];
  const PAGE_SIZE=10;
  const [period,  setPeriod]  = useState(30);
  const [sortCol, setSortCol] = useState('date');
  const [sortDir, setSortDir] = useState('desc');
  const [page,    setPage]    = useState(1);

  const toggle = col => {
    if (sortCol===col) setSortDir(d=>d==='desc'?'asc':'desc');
    else { setSortCol(col); setSortDir(col==='name'||col==='address'?'asc':'desc'); }
    setPage(1);
  };
  const arrow = col => sortCol===col ? (sortDir==='desc'?'↓':'↑') : '';

  // Reset page when period changes
  const changePeriod = p => { setPeriod(p); setPage(1); };

  // Detect doublons
  const countByKey={};
  for(const b of bookings){const k=`${b.date}|||${b.address||''}`;countByKey[k]=(countByKey[k]||0)+1;}

  const filtered=useMemo(()=>{
    let list=bookings;
    if(period>0){const since=new Date();since.setDate(since.getDate()-period);const sinceStr=dateKey(since);list=list.filter(b=>b.date>=sinceStr);}
    return list.map(b=>({...b,doublon:countByKey[`${b.date}|||${b.address||''}`]>=2}));
  },[bookings,period]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>{
    let va,vb;
    if(sortCol==='date'){va=a.date+a.startTime;vb=b.date+b.startTime;}
    else if(sortCol==='name'){va=a.name||'';vb=b.name||'';}
    else if(sortCol==='address'){va=a.address||'';vb=b.address||'';}
    else if(sortCol==='start'){va=a.startTime;vb=b.startTime;}
    else{va='';vb='';}
    const cmp=va.localeCompare(vb);
    return sortDir==='desc'?-cmp:cmp;
  }),[filtered,sortCol,sortDir]);

  const totalPages = Math.max(1, Math.ceil(sorted.length/PAGE_SIZE));
  const paginated  = sorted.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
  const doublonCount=sorted.filter(b=>b.doublon).length;
  const start=(page-1)*PAGE_SIZE+1, end=Math.min(page*PAGE_SIZE,sorted.length);

  function dlCSV(){
    const headers=['Nom','Adresse','Date','Heure début','Doublon'];
    const rows=sorted.map(b=>[b.name||'',b.address||'',b.date,b.startTime,b.doublon?'Oui':'']);
    const csv=[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='stats-reservations.csv';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }

  return html`<div class="stats-table-overlay" onClick=${e=>e.target===e.currentTarget&&onClose()}>
    <div class="stats-table-modal" onClick=${e=>e.stopPropagation()}>
      <div class="stats-table-header">
        <div>
          <div class="modal-eyebrow">Administration</div>
          <h3 class="modal-title">Tableau des réservations</h3>
        </div>
        <button class="modal-close" onClick=${onClose}><${Icon} name="x"/></button>
      </div>
      <div class="stats-table-tabs">
        ${PERIODS.map(p=>html`<button class="stats-tab ${period===p.days?'active':''}" onClick=${()=>changePeriod(p.days)}>${p.label}</button>`)}
      </div>
      <div class="stats-table-wrap">
        <table class="stats-tbl">
          <thead>
            <tr>
              <th class="${sortCol==='name'?'active':''}" onClick=${()=>toggle('name')}>Nom <span class="sort-arrow">${arrow('name')}</span></th>
              <th class="${sortCol==='address'?'active':''}" onClick=${()=>toggle('address')}>Adresse <span class="sort-arrow">${arrow('address')}</span></th>
              <th class="${sortCol==='date'?'active':''}" onClick=${()=>toggle('date')}>Date <span class="sort-arrow">${arrow('date')}</span></th>
              <th class="${sortCol==='start'?'active':''}" onClick=${()=>toggle('start')}>Heure début <span class="sort-arrow">${arrow('start')}</span></th>
              <th>Doublon</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.length===0
              ? html`<tr><td colspan="5" style="text-align:center;color:var(--muted);font-style:italic;padding:24px">Aucune réservation sur cette période.</td></tr>`
              : paginated.map(b=>html`<tr key=${b.id}>
                  <td style="font-weight:600">${b.name||'—'}</td>
                  <td style="color:var(--muted)">${b.address||'—'}</td>

function ResidentsView({residents,onSave,fromEntry,onBack}) {
  const [form,       setForm]       = useState(null);
  const [confirm,    setConfirm]    = useState(null);
  const [importData, setImportData] = useState(null);
  const [importing,  setImporting]  = useState(false);
  const fileRef = { current: null };

  const addResident    = data => { onSave([...residents,{id:uid(),...data}]); setForm(null); };
  const editResident   = (id,data) => { onSave(residents.map(r=>r.id===id?{...r,...data}:r)); setForm(null); };
  const deleteResident = id => { onSave(residents.filter(r=>r.id!==id)); setConfirm(null); };
  const confirmImport  = () => { onSave(importData); setImportData(null); };

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    try {
      let parsed;
      if (file.name.toLowerCase().endsWith('.csv')) {
        parsed = parseCSVResidents(await file.text());
      } else {
        parsed = await parseXLSXResidents(file);
      }
      if (parsed.length === 0) { alert('Aucun résident trouvé dans le fichier. Vérifiez le format (ligne d\'en-tête + colonnes NOM, NUMÉRO, RUE).'); }
      else { setImportData(parsed); }
    } catch(err) {
      alert('Erreur lors de la lecture du fichier : ' + (err.message||err));
    }
    setImporting(false);
    if (fileRef.current) fileRef.current.value = '';
  }

  return html`<div class="view-page">
    <div class="view-nav">
      <button class="back-btn" onClick=${onBack}>
        <${Icon} name="back" size=${16}/> ${fromEntry?'Retour':'Statistiques'}
      </button>
    </div>
    <div class="view-heading" style="margin-bottom:4px">
      <h2 class="view-h1">Résidents autorisés</h2>
      <p class="view-sub">${residents.length} résident${residents.length>1?'s':''} enregistré${residents.length>1?'s':''}</p>
    </div>

    <div style="display:flex;gap:10px;padding:0 20px;margin:16px 0">
      <button class="add-resident-btn" style="margin:0;flex:1" onClick=${()=>setForm('add')}>
        <${Icon} name="plus" size=${16}/> Ajouter
      </button>
      <button onClick=${()=>fileRef.current&&fileRef.current.click()}
        style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:12px;font-weight:600;font-size:14px;font-family:inherit;cursor:pointer;flex:1;justify-content:center">
        ${importing
          ? html`<span class="spinner" style="width:14px;height:14px;border-width:2px"></span> Lecture...`
          : html`<${Icon} name="download" size=${16}/> Importer CSV/Excel`}
      </button>
      <input ref=${r=>fileRef.current=r} type="file" accept=".csv,.xlsx,.xls" style="display:none" onChange=${handleFile}/>
    </div>

    <div style="font-size:11px;color:var(--muted);padding:0 20px 12px;line-height:1.5">
      Format attendu : 1ère ligne = en-têtes, colonnes = <strong>NOM</strong> | <strong>NUMÉRO</strong> | <strong>RUE</strong>
    </div>

    <div class="residents-wrap">
      ${residents.length===0
        ? html`<p style="color:var(--muted);font-style:italic;font-size:14px;padding:20px 0">Aucun résident. Ajoutez-en pour permettre l'accès au terrain.</p>`
        : html`<table class="residents-table">
            <thead><tr><th>Nom de famille</th><th>Adresse</th><th style="width:80px"></th></tr></thead>
            <tbody>
              ${[...residents].sort((a,b)=>a.nom.localeCompare(b.nom)).map(r=>html`<tr key=${r.id}>
                <td style="font-weight:600">${r.nom}</td>
                <td style="color:var(--muted)">${r.addressNumber} ${r.addressStreet}</td>
                <td>
                  <div style="display:flex;gap:4px;justify-content:flex-end">
                    <button onClick=${()=>setForm(r)} style="padding:6px;border-radius:8px;color:var(--muted)">
                      <svg style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button onClick=${()=>setConfirm(r.id)} style="padding:6px;border-radius:8px;color:#A2351A">
                      <svg style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                  </div>
                </td>
              </tr>`)}
            </tbody>
          </table>`
      }
    </div>

    ${form==='add'        && html`<${ResidentForm} onSave=${addResident} onClose=${()=>setForm(null)}/>`}
    ${form && form!=='add'&& html`<${ResidentForm} existing=${form} onSave=${data=>editResident(form.id,data)} onClose=${()=>setForm(null)}/>`}
    ${confirm             && html`<${Modal} onClose=${()=>setConfirm(null)}>
      <div class="modal-body" style="padding:24px">
        <h3 class="modal-title">Supprimer ce résident ?</h3>
        <p class="modal-text-info" style="margin-top:10px">Ce résident ne pourra plus accéder au site de réservation.</p>
        <div class="modal-actions" style="margin-top:20px">
          <button class="btn btn-secondary" onClick=${()=>setConfirm(null)}>Annuler</button>
          <button class="btn btn-danger" onClick=${()=>deleteResident(confirm)}>Supprimer</button>
        </div>
      </div>
    </>`}
    ${importData          && html`<${ImportPreviewModal} parsed=${importData} existing=${residents.length} onConfirm=${confirmImport} onClose=${()=>setImportData(null)}/>`}
  </div>`;
}

function ContactModal({contactCfg,onClose}) {
  const [prenom,  setPrenom]  = useState('');
  const [nom,     setNom]     = useState('');
  const [email,   setEmail]   = useState('');
  const [tel,     setTel]     = useState('');
  const [message, setMessage] = useState('');
  const [sending, setSending] = useState(false);
  const [sent,    setSent]    = useState(false);
  const [error,   setError]   = useState(null);

  const valid = prenom.trim()&&nom.trim()&&email.includes('@')&&message.trim().length>5;

  async function handleSend() {
    setSending(true); setError(null);
    try {
      await sendEmail({
        to: contactCfg.email||DEFAULT_CONTACT_EMAIL,
        subject: `Message de ${prenom.trim()} ${nom.trim()} via Tennis Château Rouge`,
        html: `<p><strong>Nom :</strong> ${escapeHtml(nom.trim())} ${escapeHtml(prenom.trim())}</p>
               <p><strong>Email :</strong> ${escapeHtml(email.trim())}</p>
               ${tel?`<p><strong>Téléphone :</strong> ${escapeHtml(tel.trim())}</p>`:''}
               <p><strong>Message :</strong></p>
               <p style="white-space:pre-wrap">${escapeHtml(message.trim())}</p>`
      });
      setSent(true);
    } catch(e) {
      setError("Erreur lors de l'envoi. Réessayez.");
    }
    setSending(false);
  }

  if(sent) return html`<${Modal} onClose=${onClose}>
    <div class="modal-body" style="padding:32px 24px;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">✅</div>
      <h3 class="modal-title">Message envoyé !</h3>
      <p style="color:var(--muted);font-size:14px;margin:10px 0 20px">L'administrateur vous répondra par email.</p>
      <button class="btn btn-primary" onClick=${onClose}>Fermer</button>
    </div>
  </>`;

  return html`<${Modal} onClose=${onClose}>
    <div class="modal-header">
      <div><div class="modal-eyebrow">Contact</div><h3 class="modal-title">Contacter l'administrateur</h3></div>
      <button class="modal-close" onClick=${onClose}><${Icon} name="x"/></button>
    </div>
    <div class="modal-body">
      <div class="field-row" style="margin-bottom:14px">
        <label class="field" style="margin-bottom:0">
          <span class="field-label">Prénom</span>
          <input value=${prenom} onInput=${e=>setPrenom(e.target.value)} placeholder="Marie"/>
        </label>
        <label class="field" style="margin-bottom:0">
          <span class="field-label">Nom</span>
          <input value=${nom} onInput=${e=>setNom(e.target.value)} placeholder="Dupont"/>
        </label>
      </div>
      <label class="field">
        <span class="field-label">Email</span>
        <input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder="votre@email.fr"/>
      </label>
      <label class="field">
        <span class="field-label">Téléphone <span style="font-weight:400;opacity:.6">(optionnel)</span></span>
        <input type="tel" value=${tel} onInput=${e=>setTel(e.target.value)} placeholder="06 xx xx xx xx"/>
      </label>
      <label class="field">
        <span class="field-label">Message</span>
        <textarea value=${message} onInput=${e=>setMessage(e.target.value)}
          placeholder="Votre message..."
          style="width:100%;min-height:100px;resize:vertical;font-family:inherit;font-size:15px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px 14px;outline:none;transition:border-color .15s"></textarea>
      </label>
      ${error&&html`<p class="text-error">${error}</p>`}
      <div class="modal-actions" style="margin-top:6px">
        <button class="btn btn-secondary" onClick=${onClose}>Annuler</button>
        <button class="btn btn-primary" disabled=${!valid||sending} onClick=${handleSend}>
          ${sending?html`<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>`:'Envoyer'}
        </button>
      </div>
    </div>
  </>`;
}
