<!DOCTYPE html>
<html lang="fr">
<head>

   <meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F2EBDB">
<title>Joueurs · Château Rouge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F2EBDB;--paper:#FBF7EC;--clay:#B84A2C;--clay-deep:#82301A;--clay-soft:#F4DCD0;--green:#2D4A37;--ink:#231811;--muted:#8E8273;--line:#DCCFB6;--strip:#EFE5CF}
*,*::before,*::after{box-sizing:border-box}*{-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Manrope',system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;min-height:100dvh}
button{font-family:inherit;font-size:inherit;border:none;background:none;cursor:pointer;color:inherit;padding:0;transition:transform .05s}
button:active:not(:disabled){transform:scale(.97)}button:disabled{opacity:.45;cursor:default}
input,select,textarea{font-family:inherit;font-size:16px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:12px 14px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;appearance:none;-webkit-appearance:none;resize:none}
input:focus,select:focus,textarea:focus{border-color:var(--clay);box-shadow:0 0 0 3px rgba(184,74,44,.15)}
select{background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%238E8273' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:40px}
.court-line{height:1px;background:linear-gradient(to right,transparent,var(--line) 20%,var(--line) 80%,transparent);position:relative;margin:0 auto}
.court-line::before,.court-line::after{content:'';position:absolute;top:50%;width:4px;height:4px;border-radius:50%;background:var(--clay)}
.court-line::before{left:calc(50% - 12px);transform:translateY(-50%)}
.court-line::after{left:calc(50% + 8px);transform:translateY(-50%)}
.app{max-width:640px;margin:0 auto;padding-bottom:60px}
.header{background:var(--paper);border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:10}
.emblem{width:40px;height:40px;border-radius:50%;background:var(--clay);flex-shrink:0;position:relative;box-shadow:0 4px 12px rgba(184,74,44,.25)}
.emblem::before{content:'';position:absolute;inset:5px;border:2px solid var(--paper);border-radius:50%}
.emblem::after{content:'';position:absolute;top:50%;left:15%;width:70%;height:1.5px;background:var(--paper);border-radius:999px;transform:rotate(-25deg)}
.emblem.lg{width:52px;height:52px}.emblem.lg::before{inset:7px}
.modal-overlay{position:fixed;inset:0;background:rgba(31,22,17,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;animation:fadeIn .15s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:24px;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.25);animation:slideUp .2s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.btn{flex:1;padding:13px;border-radius:14px;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn-secondary{background:var(--bg);color:var(--ink)}.btn-primary{background:var(--clay);color:var(--paper)}.btn-danger{background:#A2351A;color:var(--paper)}.btn-green{background:var(--green);color:var(--paper)}
.spinner{width:28px;height:28px;border:3px solid var(--clay-soft);border-top-color:var(--clay);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.profile-entry{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px 20px}
.chip{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s;cursor:pointer;border:1px solid var(--line)}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--paper);padding:10px 18px;border-radius:999px;font-weight:500;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;z-index:200;max-width:calc(100% - 32px)}
.icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.icon-sm{width:16px;height:16px}.icon-xs{width:13px;height:13px}
.text-help{color:var(--muted);font-size:12px;margin:6px 0 0;line-height:1.4}
.text-error{color:#A2351A;font-size:13px;margin:6px 0 0}
.field{display:block;margin-bottom:14px}
.field-label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.ann-card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:20px;position:relative;overflow:hidden}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);font-weight:600;margin-bottom:8px}
</style>
</head>
<body>
<div id="app"><div class="loading-screen"><div class="spinner"></div></div></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.22.0';
import { useState, useEffect, useMemo } from 'https://esm.sh/preact@10.22.0/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);
   if (!localStorage.getItem('tennis-cr-session')) { window.location.href = 'index.html'; }

/* ============================================================
   CONFIGURATION
   ============================================================ */
const ADMIN_CODE = 'toto';
const FB_URL     = 'https://jardinduchateau-test-default-rtdb.europe-west1.firebasedatabase.app';

const STREETS    = ['rue du Docteur François', 'rue du Collège'];
const FR_DAYS    = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const SLOTS_H    = Array.from({length:15},(_,i)=>`${String(i+8).padStart(2,'0')}:00`);
const EXPIRE_DAYS = 7;
const MAX_DISPOS  = 5;

/* ── helpers ── */
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const profileAddr = p => p?.addressNumber&&p?.addressStreet ? `${p.addressNumber} ${p.addressStreet}` : '';
const daysLeft = a => Math.max(0, Math.ceil((a.expiresAt - Date.now())/86400000));

/* ── Firebase ── */
async function fbGet(path) {
  const res = await fetch(`${FB_URL}/${path}.json`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}
async function fbPut(path, data) {
  const res = await fetch(`${FB_URL}/${path}.json`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  if (!res.ok) { const t=await res.text().catch(()=>''); throw new Error(`HTTP ${res.status} ${t}`.trim()); }
}
async function profileGet(userId){try{const d=await fbGet(`profiles/${userId}`);return d||{};}catch{return {};}}
async function profileSet(userId,data){await fbPut(`profiles/${userId}`,data);}
const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9|]/g,'_');
const makeUserId=p=>[p.prenom,p.nom,p.addressNumber,p.addressStreet].map(norm).join('|');
const makePersonKey=p=>[p.prenom||p.name||'',p.nom||'',p.addressNumber||'',p.addressStreet||''].join('|').toLowerCase();

async function pantryGet() { const d=await fbGet('annonces'); if(!d)return{annonces:[]}; return{annonces:Array.isArray(d)?d:Object.values(d)}; }
async function pantrySave(annonces) { await fbPut('annonces', annonces); }

/* ── localStorage ── */
const loadAdminFlag = ()=>{try{return localStorage.getItem('tennis-cr-admin')==='1';}catch{return false;}};
const saveAdminFlag = v=>{try{v?localStorage.setItem('tennis-cr-admin','1'):localStorage.removeItem('tennis-cr-admin');}catch{}};

const profileFullName = p => p?.prenom&&p?.nom ? `${p.prenom} ${p.nom}` : (p?.name||'');

const loadProfile = () => {
  try {
    const r=localStorage.getItem('tennis-cr-profile');
    if(!r) return null;
    const p=JSON.parse(r);
    // New format: prenom + nom
    if(p?.prenom&&p?.nom&&p?.addressNumber&&p?.addressStreet) return p;
    // Old format: name
    if(p?.name&&p?.addressNumber&&p?.addressStreet) return p;
    return null;
  } catch {return null;}
};

/* ── ICON ── */
function Icon({name,size=20}) {
  const paths = {
    plus:  html`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
    x:     html`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
    check: html`<polyline points="20 6 9 17 4 12"/>`,
    trash: html`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>`,
    edit:  html`<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>`,
    user:  html`<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>`,
    back:  html`<polyline points="15 18 9 12 15 6"/>`,
    clock: html`<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
    mail:  html`<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>`,
    phone: html`<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.77 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>`,
    eye:   html`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
    'eye-off': html`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`,
  };
  return html`<svg class="icon" style=${`width:${size}px;height:${size}px`} viewBox="0 0 24 24">${paths[name]}</svg>`;
}

/* ── Stars ── */
function Stars({value}) {
  return html`<span style="display:inline-flex;gap:2px">
    ${[1,2,3,4,5].map(i=>html`<svg key=${i} width="12" height="12" viewBox="0 0 24 24" fill=${i<=value?'var(--clay)':'var(--line)'} stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`)}
  </span>`;
}

/* ── Modal ── */
function Modal({onClose,children}) {
  return html`<div class="modal-overlay" onClick=${e=>e.target===e.currentTarget&&onClose()}>
    <div class="modal" onClick=${e=>e.stopPropagation()}>${children}</div>
  </div>`;
}

/* ── AnnonceCard ── */
function AnnonceCard({ann,isMine,isAdmin,onEdit,onDelete}) {
  const days = daysLeft(ann);
  return html`
    <div class="ann-card">
      <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${isMine?'var(--green)':'var(--clay)'};border-radius:20px 0 0 20px"></div>
      <div style="padding-left:12px">
        <!-- Header -->
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px">
          <div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:17px">${ann.name}</span>
              ${isMine&&html`<span style="font-size:11px;background:var(--green);color:var(--paper);padding:2px 8px;border-radius:999px;font-weight:700;letter-spacing:.07em;text-transform:uppercase">Vous</span>`}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${ann.address}</div>
          </div>
          ${(isMine||isAdmin) && html`<div style="display:flex;gap:6px;flex-shrink:0">
            ${isMine && html`<button onClick=${onEdit} style="width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center"><${Icon} name="edit" size=${14}/></button>`}
            <button onClick=${onDelete} style="width:32px;height:32px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center"><${Icon} name="trash" size=${14}/></button>
          </div>`}
        </div>
        <!-- Niveau -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600">Niveau</span>
          <${Stars} value=${ann.niveau}/>
          ${ann.niveauDetail&&html`<span style="font-size:12px;color:var(--muted)">${ann.niveauDetail}</span>`}
        </div>
        <!-- Dispos -->
        <div style="margin-bottom:10px">
          <div class="section-title">Disponibilités</div>
          <div style="display:flex;flex-direction:column;gap:5px">
            ${ann.dispos.map((d,i)=>html`<div key=${i} style="display:flex;align-items:center;gap:8px">
              <span style="font-size:12px;background:var(--clay-soft);color:var(--clay-deep);padding:3px 10px;border-radius:999px;font-weight:600;min-width:90px;text-align:center">${d.day}</span>
              <span style="font-size:13px;font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums">${d.start.replace(':00','h')} → ${d.end.replace(':00','h')}</span>
            </div>`)}
          </div>
        </div>
        <!-- Contact -->
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
          ${ann.email&&html`<div style="display:flex;align-items:center;gap:8px">
            <${Icon} name="mail" size=${14}/>
            <span style="font-size:13px;font-weight:600;color:${ann.hideEmail?'var(--muted)':'inherit'}">${ann.hideEmail?'Email non public':ann.email}</span>
          </div>`}
          ${ann.tel&&html`<div style="display:flex;align-items:center;gap:8px">
            <${Icon} name="phone" size=${14}/>
            <span style="font-size:13px;font-weight:600;color:${ann.hideTel?'var(--muted)':'inherit'}">${ann.hideTel?'Téléphone non public':ann.tel}</span>
          </div>`}
          ${!ann.email&&!ann.tel&&ann.contact&&html`<div style="display:flex;align-items:center;gap:8px">
            <${Icon} name=${ann.contact.includes('@')?'mail':'phone'} size=${14}/>
            <span style="font-size:13px;font-weight:600">${ann.contact}</span>
          </div>`}
        </div>
        <!-- Expiry -->
        <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:${days<=2?'var(--clay)':'var(--muted)'}">
          <${Icon} name="clock" size=${12}/>
          ${days===0?'Expire aujourd\'hui':`Expire dans ${days} jour${days>1?'s':''}`}
        </div>
      </div>
    </div>
  `;
}

/* ── AnnonceForm ── */
function AnnonceForm({existing,profile,onSave,onClose}) {
  const [niveau,        setNiveau]        = useState(existing?.niveau??3);
  const [niveauDetail,  setNiveauDetail]  = useState(existing?.niveauDetail??'');
  const [dispos,        setDispos]        = useState(existing?.dispos??[]);
  const [email,         setEmail]         = useState(existing?.email??'');
  const [tel,           setTel]           = useState(existing?.tel??'');
  const [hideEmail,     setHideEmail]     = useState(existing?.hideEmail??false);
  const [hideTel,       setHideTel]       = useState(existing?.hideTel??false);
  const [newDay,        setNewDay]        = useState(FR_DAYS[0]);
  const [newStart,      setNewStart]      = useState('09:00');
  const [newEnd,        setNewEnd]        = useState('10:00');
  const [saving,        setSaving]        = useState(false);
  const [error,         setError]         = useState(null);
  const [loadingContact,setLoadingContact]= useState(false);

  useEffect(()=>{
    if (!profile?.prenom||!profile?.nom) return;
    setLoadingContact(true);
    profileGet(makeUserId(profile)).then(p=>{
      if (p.email&&!email) setEmail(p.email);
      if (p.tel&&!tel)     setTel(p.tel);
    }).catch(()=>{}).finally(()=>setLoadingContact(false));
  },[]);

  const endOptions = SLOTS_H.filter(h=>h>newStart);
  const addSlot = ()=>{ if(dispos.length>=MAX_DISPOS)return; setDispos(prev=>[...prev,{day:newDay,start:newStart,end:newEnd}]); };
  const removeSlot = i=>setDispos(prev=>prev.filter((_,idx)=>idx!==i));

  const bothHidden = hideEmail&&hideTel;
  const hasContact = email.trim()||tel.trim();
  const valid = dispos.length>0 && hasContact && !bothHidden;

  async function submit() {
    setSaving(true); setError(null);
    try {
      if (profile?.prenom&&profile?.nom) {
        try {
          const userId=makeUserId(profile);
          const cur=await profileGet(userId);
          await profileSet(userId,{
            ...cur,
            prenom:profile.prenom||'',nom:profile.nom||'',
            addressNumber:profile.addressNumber||'',addressStreet:profile.addressStreet||'',
            ...(email.trim()?{email:email.trim()}:{}),
            ...(tel.trim()?{tel:tel.trim()}:{})
          });
        } catch {}
      }
      await onSave({niveau,niveauDetail,dispos,email:email.trim(),tel:tel.trim(),hideEmail,hideTel});
    } catch(e) { setError(e.message||'Erreur'); setSaving(false); }
  }

  return html`<${Modal} onClose=${onClose}>
    <div style="padding:22px 24px 8px;display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:600;margin-bottom:4px">Annonce</div>
        <h3 style="font-family:'Fraunces',Georgia,serif;font-size:22px;font-weight:600;margin:0;letter-spacing:-.01em">${existing?'Modifier mon annonce':'Disponible pour jouer'}</h3>
      </div>
      <button onClick=${onClose} style="padding:8px;margin:-8px -8px 0 0;color:var(--muted)"><${Icon} name="x"/></button>
    </div>
    <div style="padding:14px 24px 22px;display:flex;flex-direction:column;gap:16px">

      <!-- Niveau -->
      <div>
        <div class="field-label">Niveau (1–5)</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${[1,2,3,4,5].map(n=>html`<button key=${n} onClick=${()=>setNiveau(n)}
            style="width:38px;height:38px;border-radius:50%;font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:600;background:${niveau===n?'var(--clay)':'var(--bg)'};color:${niveau===n?'var(--paper)':'var(--muted)'};border:${niveau===n?'none':'1px solid var(--line)'};transition:all .15s">${n}</button>`)}
        </div>
        <input value=${niveauDetail} onInput=${e=>setNiveauDetail(e.target.value)} placeholder="Précisez (ex. : Classement FFT 30/1)" style="margin-top:10px"/>
      </div>

      <!-- Disponibilités -->
      <div>
        <div class="field-label">Disponibilités (${dispos.length}/${MAX_DISPOS})</div>
        ${dispos.length>0&&html`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
          ${dispos.map((d,i)=>html`<div key=${i} style="display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:8px 12px">
            <span style="font-size:13px;font-weight:600;color:var(--clay-deep);min-width:80px">${d.day}</span>
            <span style="font-size:13px;font-family:'Fraunces',Georgia,serif;font-variant-numeric:tabular-nums;flex:1">${d.start.replace(':00','h')} → ${d.end.replace(':00','h')}</span>
            <button onClick=${()=>removeSlot(i)} style="color:var(--muted);padding:4px"><${Icon} name="x" size=${14}/></button>
          </div>`)}
        </div>`}
        ${dispos.length<MAX_DISPOS&&html`<div style="background:var(--bg);border-radius:12px;padding:12px;border:1px dashed var(--line)">
          <div style="display:grid;grid-template-columns:1fr 70px 70px auto;gap:8px;align-items:center">
            <select value=${newDay} onChange=${e=>setNewDay(e.target.value)} style="padding:10px 12px;font-size:14px">
              ${FR_DAYS.map(d=>html`<option key=${d} value=${d}>${d}</option>`)}
            </select>
            <select value=${newStart} onChange=${e=>{setNewStart(e.target.value);if(newEnd<=e.target.value)setNewEnd(SLOTS_H[SLOTS_H.indexOf(e.target.value)+1]||'22:00');}} style="padding:10px 6px;font-size:14px;background-image:none;text-align:center">
              ${SLOTS_H.slice(0,-1).map(h=>html`<option key=${h} value=${h}>${h.replace(':00','h')}</option>`)}
            </select>
            <select value=${newEnd} onChange=${e=>setNewEnd(e.target.value)} style="padding:10px 6px;font-size:14px;background-image:none;text-align:center">
              ${endOptions.map(h=>html`<option key=${h} value=${h}>${h.replace(':00','h')}</option>`)}
            </select>
            <button onClick=${addSlot} style="width:38px;height:38px;border-radius:10px;background:var(--clay);color:var(--paper);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <${Icon} name="plus" size=${18}/>
            </button>
          </div>
        </div>`}
        ${dispos.length===0&&html`<div class="text-help">Ajoutez au moins un créneau.</div>`}
      </div>

      <!-- Contact -->
      <div>
        <div class="field-label">Coordonnées</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Email</div>
            <div style="position:relative">
              <input type="email" value=${email} onInput=${e=>setEmail(e.target.value)} placeholder=${loadingContact?'Chargement...':'votre@email.fr'} disabled=${loadingContact} style="padding-right:44px"/>
              <button type="button" onClick=${()=>setHideEmail(h=>!h)} title=${hideEmail?'Email masqué aux autres':'Email visible par les autres'}
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:4px;color:${hideEmail?'var(--muted)':'var(--clay)'};display:flex;align-items:center;background:none;border:none;cursor:pointer">
                <${Icon} name=${hideEmail?'eye-off':'eye'} size=${18}/>
              </button>
            </div>
            <div class="text-help">${hideEmail?'Email non public — non visible par les autres joueurs':'Email visible par les autres joueurs'}</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Téléphone</div>
            <div style="position:relative">
              <input type="tel" value=${tel} onInput=${e=>setTel(e.target.value)} placeholder=${loadingContact?'Chargement...':'06 xx xx xx xx'} disabled=${loadingContact} style="padding-right:44px"/>
              <button type="button" onClick=${()=>setHideTel(h=>!h)} title=${hideTel?'Téléphone masqué aux autres':'Téléphone visible par les autres'}
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:4px;color:${hideTel?'var(--muted)':'var(--clay)'};display:flex;align-items:center;background:none;border:none;cursor:pointer">
                <${Icon} name=${hideTel?'eye-off':'eye'} size=${18}/>
              </button>
            </div>
            <div class="text-help">${hideTel?'Téléphone non public — non visible par les autres joueurs':'Téléphone visible par les autres joueurs'}</div>
          </div>
        </div>
        ${bothHidden&&html`<p class="text-error" style="margin-top:10px">Vous devez laisser au moins un moyen de contact visible pour être joignable.</p>`}
        ${!hasContact&&!loadingContact&&html`<div class="text-help" style="margin-top:6px">Renseignez au moins un email ou un téléphone.</div>`}
      </div>

      ${error&&html`<p class="text-error">${error}</p>`}

      <div style="display:flex;gap:12px">
        <button class="btn btn-secondary" onClick=${onClose}>Annuler</button>
        <button class="btn btn-primary" disabled=${!valid||saving} onClick=${submit}>
          ${saving?html`<span class="spinner" style="width:14px;height:14px;border-width:2px"></span>`:html`<${Icon} name="check" size=${16}/>`}
          ${existing?'Enregistrer':'Publier'}
        </button>
      </div>
    </div>
  </>`;
}

/* ── ProfileEntry ── */
function ProfileEntry({onSubmit}) {
  const [name,          setName]          = useState('');
  const [addressNumber, setAddressNumber] = useState('');
  const [addressStreet, setAddressStreet] = useState(STREETS[0]);
  const valid = name.trim().length>0 && addressNumber.trim().length>0;
  return html`<div class="profile-entry">
    <div style="max-width:420px;width:100%">
      <div style="text-align:center;margin-bottom:28px">
        <div class="emblem lg" style="margin:0 auto"></div>
        <h1 style="font-family:'Fraunces',Georgia,serif;font-size:28px;font-weight:600;letter-spacing:-.01em;margin:16px 0 0">
          Joueurs de <em style="color:var(--clay);font-style:italic">Château Rouge</em>
        </h1>
        <div class="court-line" style="width:120px;margin:14px auto"></div>
        <p style="color:var(--muted);font-size:14px;line-height:1.5;margin:0">Trouvez un partenaire de jeu parmi vos voisins.</p>
      </div>
      <div style="background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:20px">
        <label class="field">
          <span class="field-label">Prénom &amp; nom</span>
          <input value=${name} onInput=${e=>setName(e.target.value)} placeholder="ex. Marie Lefèvre" autoFocus/>
        </label>
        <div class="field">
          <span class="field-label">Adresse</span>
          <div style="display:grid;grid-template-columns:80px 1fr;gap:8px">
            <input value=${addressNumber} onInput=${e=>setAddressNumber(e.target.value)} placeholder="N°" style="text-align:center"/>
            <select value=${addressStreet} onChange=${e=>setAddressStreet(e.target.value)}>
              ${STREETS.map(s=>html`<option key=${s} value=${s}>${s}</option>`)}
            </select>
          </div>
          <div class="text-help">Réservé aux habitants du lotissement du Château Rouge.</div>
        </div>
        <button class="btn btn-primary" disabled=${!valid} onClick=${()=>valid&&onSubmit({name:name.trim(),addressNumber:addressNumber.trim(),addressStreet})} style="width:100%">
          <${Icon} name="user" size=${18}/>
          Accéder aux annonces
        </button>
      </div>
    </div>
  </div>`;
}

/* ── APP ── */
function App() {
  const [profile,  setProfile]  = useState(loadProfile);
  const [annonces, setAnnonces] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [modal,    setModal]    = useState(null);
  const [toast,    setToast]    = useState(null);
  const [syncing,  setSyncing]  = useState(false);

  const [isAdmin,  setIsAdmin]  = useState(loadAdminFlag);
  const myAddr      = profile ? profileAddr(profile) : null;
  const myPersonKey = profile ? makePersonKey(profile) : null;
  const myAnn       = useMemo(()=>annonces.find(a=>a.personKey&&myPersonKey?a.personKey===myPersonKey:a.address===myAddr),[annonces,myAddr,myPersonKey]);

  useEffect(()=>{
    (async()=>{
      try { const d=await pantryGet(); setAnnonces(d.annonces.filter(a=>a.expiresAt>Date.now())); }
      catch {}
      finally { setLoading(false); }
    })();
  },[]);

  useEffect(()=>{
    if (!profile) return;
    const tick = async()=>{ if(document.hidden) return; try { const d=await pantryGet(); setAnnonces(d.annonces.filter(a=>a.expiresAt>Date.now())); } catch {} };
    const id = setInterval(tick,20000);
    document.addEventListener('visibilitychange',tick);
    return ()=>{ clearInterval(id); document.removeEventListener('visibilitychange',tick); };
  },[profile]);

  const showToast = (msg,kind='success') => { setToast({msg,kind}); setTimeout(()=>setToast(null),2600); };

  const tryAdmin = code => {
    if(code!==ADMIN_CODE) return false;
    saveAdminFlag(true); setIsAdmin(true); setModal(null);
    showToast('Mode administrateur activé'); return true;
  };
  const logoutAdmin = () => { saveAdminFlag(false); setIsAdmin(false); showToast('Mode admin désactivé'); };

  const saveAnn = async data => {
    setSyncing(true);
    const now = Date.now();
    let updated;
    if (myAnn) {
      updated = annonces.map(a=>a.id===myAnn.id?{...a,...data}:a);
    } else {
      const newAnn={id:uid(),name:profileFullName(profile),address:myAddr,personKey:myPersonKey,...data,createdAt:now,expiresAt:now+EXPIRE_DAYS*86400000};
      updated=[...annonces,newAnn];
    }
    try {
      await pantrySave(updated);
      setAnnonces(updated);
      showToast(myAnn?'Annonce mise à jour':'Annonce publiée !');
      setModal(null);
    } catch(e) { throw e; }
    finally { setSyncing(false); }
  };

  const deleteAnn = async() => {
    const idToDel = modal?.targetId || myAnn?.id;
    const updated = annonces.filter(a=>a.id!==idToDel);
    try { await pantrySave(updated); setAnnonces(updated); showToast('Annonce supprimée'); setModal(null); }
    catch { showToast('Erreur lors de la suppression','error'); }
  };

  if (loading) return html`<div class="loading-screen"><div class="spinner"></div></div>`;
  if (!profile) return html`<${ProfileEntry} onSubmit=${p=>setProfile(p)}/>`;

  const sorted = [...annonces].sort((a,b)=>b.createdAt-a.createdAt);

  return html`<div class="app">
    <!-- Header -->
    <header class="header">
      <div style="display:flex;align-items:center;gap:12px;min-width:0">
        <div class="emblem"></div>
        <div style="min-width:0">
          <h1 style="font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:18px;line-height:1;letter-spacing:-.01em;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Joueurs · Château Rouge</h1>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">Trouver un partenaire</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <a href="index.html" style="font-size:12px;color:var(--clay);font-weight:600;text-decoration:none;display:flex;align-items:center;gap:4px">
          <${Icon} name="back" size=${14}/> Tennis
        </a>
        ${isAdmin&&html`<button onClick=${logoutAdmin} style="background:var(--green);color:var(--paper);font-size:10px;letter-spacing:.07em;text-transform:uppercase;font-weight:600;padding:5px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;font-family:inherit;border:none;cursor:pointer">
          <${Icon} name="shield" size=${12}/> Admin
        </button>`}
        <div style="background:var(--bg);padding:5px 10px;border-radius:999px;font-size:13px;display:flex;align-items:center;gap:5px;font-weight:500">
          <${Icon} name="user" size=${13}/>
          <span style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${profileFullName(profile)}</span>
        </div>
      </div>
    </header>

    <!-- Hero -->
    <section style="padding:24px 20px 0">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;text-transform:uppercase;letter-spacing:.18em;color:var(--muted)">${annonces.length} joueur${annonces.length>1?'s':''} disponible${annonces.length>1?'s':''}</span>
        <span style="font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:12px;color:var(--muted)">court n°1</span>
      </div>
      <h2 style="font-family:'Fraunces',Georgia,serif;font-size:28px;font-weight:600;line-height:1.1;letter-spacing:-.01em;margin:0 0 20px">
        Trouvez un <em style="color:var(--clay);font-style:italic">partenaire</em><br/>parmi vos voisins.
      </h2>

      ${myAnn
        ? html`<div style="background:var(--green);border-radius:16px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div>
              <div style="font-weight:600;color:var(--paper);font-size:14px">Votre annonce est active</div>
              <div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:2px">Expire dans ${daysLeft(myAnn)} jour${daysLeft(myAnn)>1?'s':''}</div>
            </div>
            <button onClick=${()=>setModal('form')} style="background:rgba(255,255,255,.2);color:var(--paper);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;font-family:inherit">
              <${Icon} name="edit" size=${14}/> Modifier
            </button>
          </div>`
        : html`<button onClick=${()=>setModal('form')} style="width:100%;background:var(--clay);color:var(--paper);padding:15px;border-radius:16px;font-weight:600;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(184,74,44,.25);font-family:inherit">
            <${Icon} name="plus" size=${20}/> Disponible pour jouer
          </button>`
      }
      <div class="court-line" style="width:100%;margin-top:22px"></div>
    </section>

    <!-- Annonces -->
    <div style="padding:20px;display:flex;flex-direction:column;gap:12px">
      ${sorted.length===0
        ? html`<div style="text-align:center;padding:40px 20px;color:var(--muted)">
            <div style="font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:18px;margin-bottom:8px">Aucune annonce pour le moment.</div>
            <div style="font-size:14px">Soyez le premier à publier votre disponibilité.</div>
          </div>`
        : sorted.map(ann=>html`<${AnnonceCard} key=${ann.id} ann=${ann} isMine=${ann.personKey&&myPersonKey?ann.personKey===myPersonKey:ann.address===myAddr} isAdmin=${isAdmin} onEdit=${()=>setModal('form')} onDelete=${()=>setModal({type:'delete',targetId:ann.id,targetName:ann.name})}/>`)
      }
    </div>

    <!-- Footer -->
    <div style="margin:20px 20px 0;text-align:center">
      <div class="court-line" style="width:100px;margin:0 auto 14px"></div>
      <div style="font-family:'Fraunces',Georgia,serif;font-style:italic;font-size:14px;color:var(--muted)">Bon match.</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;opacity:.6">Les annonces expirent automatiquement après ${EXPIRE_DAYS} jours.</div>
      <button onClick=${()=>isAdmin?logoutAdmin():setModal('admin')} style="display:inline-block;margin-top:14px;color:var(--muted);font-size:11px;opacity:.55;font-family:inherit;background:none;border:none;cursor:pointer">
        ${isAdmin?'Désactiver le mode admin':'Mode administrateur'}
      </button>
    </div>

    <!-- Modals -->
    ${modal==='admin'&&html`<${AdminModal} onClose=${()=>setModal(null)} onSubmit=${tryAdmin}/>`}
    ${modal==='form'&&html`<${AnnonceForm} existing=${myAnn} profile=${profile} onSave=${saveAnn} onClose=${()=>setModal(null)}/>`}
    ${modal?.type==='delete'&&html`<${Modal} onClose=${()=>setModal(null)}>
      <div style="padding:24px">
        <h3 style="font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;margin:0 0 10px">Supprimer cette annonce ?</h3>
        <p style="font-size:14px;color:var(--muted);margin:0 0 20px">${modal.targetName} ne sera plus visible dans la liste.</p>
        <div style="display:flex;gap:12px">
          <button class="btn btn-secondary" onClick=${()=>setModal(null)}>Annuler</button>
          <button class="btn btn-danger" onClick=${deleteAnn}>Supprimer</button>
        </div>
      </div>
    </>`}

    <!-- Toast -->
    ${toast&&html`<div class="toast">${toast.msg}</div>`}
  </div>`;
}

function AdminModal({onClose,onSubmit}) {
  const [code,setCode]=useState('');
  const [err,setErr]=useState(false);
  const handle=()=>{const ok=onSubmit(code);if(!ok) setErr(true);};
  return html`<${Modal} onClose=${onClose}>
    <div style="padding:22px 24px 8px;display:flex;align-items:flex-start;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:var(--paper)"><${Icon} name="shield" size=${20}/></div>
        <div>
          <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px">Réservé</div>
          <h3 style="font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;margin:0">Mode administrateur</h3>
        </div>
      </div>
      <button onClick=${onClose} style="padding:8px;color:var(--muted)"><${Icon} name="x"/></button>
    </div>
    <div style="padding:14px 24px 22px">
      <p style="font-size:14px;color:var(--muted);margin:0 0 14px">Ce mode permet de supprimer l'annonce de n'importe quel voisin.</p>
      <div style="margin-bottom:14px">
        <div class="field-label">Code</div>
        <input type="password" autoFocus value=${code} onInput=${e=>{setCode(e.target.value);setErr(false);}} onKeyDown=${e=>e.key==='Enter'&&handle()}/>
      </div>
      ${err&&html`<p style="color:#A2351A;font-size:13px;margin:0 0 10px">Code incorrect.</p>`}
      <div style="display:flex;gap:12px">
        <button class="btn btn-secondary" onClick=${onClose}>Annuler</button>
        <button class="btn btn-green" disabled=${!code} onClick=${handle}>Activer</button>
      </div>
    </div>
  </>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
